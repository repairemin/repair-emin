<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hanoi High-Detail Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #a5e1ff; }
        #info {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); color: #00ffcc;
            padding: 10px; font-family: monospace; border-left: 4px solid #fff;
        }
    </style>
</head>
<body>
    <div id="info">LOCATION: HANOI_CITY | SCAN_MODE: HIGH_RES</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa5e1ff);
        scene.fog = new THREE.FogExp2(0xa5e1ff, 0.001);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Ánh sáng mặt trời mạnh hơn để làm rõ chi tiết
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(100, 500, 100);
        scene.add(sun);

        // --- HÀM VẼ ĐƯỜNG PHỐ CHI TIẾT (CANVAS TEXTURE) ---
        function createRoadTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');

            // Nền nhựa đường xám đậm
            ctx.fillStyle = '#333333';
            ctx.fillRect(0, 0, 512, 512);

            // Vạch kẻ tim đường (đứt đoạn)
            ctx.strokeStyle = '#ffffff';
            ctx.setLineDash([20, 20]);
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(256, 0); ctx.lineTo(256, 512);
            ctx.moveTo(0, 256); ctx.lineTo(512, 256);
            ctx.stroke();

            // Vạch đi bộ (Zebra crossing) tại ngã tư
            ctx.setLineDash([]);
            ctx.fillStyle = '#ffffff';
            for(let i=0; i<6; i++) {
                ctx.fillRect(230 + i*8, 180, 4, 30); // Ngang
                ctx.fillRect(180, 230 + i*8, 30, 4); // Dọc
            }

            return new THREE.CanvasTexture(canvas);
        }

        const roadTex = createRoadTexture();
        roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping;
        roadTex.repeat.set(10, 10);

        // --- XÂY DỰNG MẶT ĐẤT ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(2000, 2000),
            new THREE.MeshLambertMaterial({ map: roadTex })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- PHÂN KHU HÀ NỘI ---
        const city = new THREE.Group();
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);

        function addBuilding(x, z, type) {
    let h, w, d, color;
    if (type === 'old') {
        h = 25 + Math.random() * 30;
        w = 14 + Math.random() * 8;
        d = 20 + Math.random() * 12;

        const componentType = Math.floor(Math.random() * 9);

        if (componentType === 0) {
            // ===== ĐIỆN TRỞ =====
            const rLen = w * 1.8;
            const rRad = h * 0.18;
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(rRad, rRad, rLen, 12),
                new THREE.MeshPhongMaterial({ color: 0xd4b483 })
            );
            body.rotation.z = Math.PI / 2;
            body.position.set(x, rRad + 1, z);
            city.add(body);

            const bandColors = [0xcc0000, 0xff6600, 0xffcc00, 0x336600, 0x000099, 0x999999, 0xffffff, 0x000000];
            for (let b = 0; b < 4; b++) {
                const band = new THREE.Mesh(
                    new THREE.CylinderGeometry(rRad + 0.3, rRad + 0.3, rLen * 0.07, 12),
                    new THREE.MeshPhongMaterial({ color: bandColors[Math.floor(Math.random() * bandColors.length)] })
                );
                band.rotation.z = Math.PI / 2;
                band.position.set(x - rLen * 0.3 + b * rLen * 0.2, rRad + 1, z);
                city.add(band);
            }

            [-rLen * 0.52, rLen * 0.52].forEach(ox => {
                const leg = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.4, rRad + 1, 6),
                    new THREE.MeshPhongMaterial({ color: 0xbbbbbb })
                );
                leg.position.set(x + ox, (rRad + 1) / 2, z);
                city.add(leg);
            });

        } else if (componentType === 1) {
            // ===== DIODE =====
            const dLen = w * 1.4;
            const dRad = h * 0.15;

            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(dRad, dRad, dLen, 12),
                new THREE.MeshPhongMaterial({ color: 0x111111 })
            );
            body.rotation.z = Math.PI / 2;
            body.position.set(x, dRad + 1, z);
            city.add(body);

            const stripe = new THREE.Mesh(
                new THREE.CylinderGeometry(dRad + 0.3, dRad + 0.3, dLen * 0.1, 12),
                new THREE.MeshPhongMaterial({ color: 0xffffff })
            );
            stripe.rotation.z = Math.PI / 2;
            stripe.position.set(x + dLen * 0.38, dRad + 1, z);
            city.add(stripe);

            [-dLen * 0.55, dLen * 0.55].forEach(ox => {
                const leg = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.4, dRad + 1, 6),
                    new THREE.MeshPhongMaterial({ color: 0xbbbbbb })
                );
                leg.position.set(x + ox, (dRad + 1) / 2, z);
                city.add(leg);
            });

        } else if (componentType === 2) {
            // ===== CUỘN CẢM =====
            const iRad = h * 0.12;
            const iLen = w * 1.6;
            const coilMat = new THREE.MeshPhongMaterial({ color: 0xcc8800, shininess: 180 });

            const core = new THREE.Mesh(
                new THREE.CylinderGeometry(iRad * 0.5, iRad * 0.5, iLen * 0.9, 10),
                new THREE.MeshPhongMaterial({ color: 0x444444 })
            );
            core.rotation.z = Math.PI / 2;
            core.position.set(x, iRad + 1, z);
            city.add(core);

            for (let c = 0; c < 8; c++) {
                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(iRad, iRad * 0.28, 8, 16),
                    coilMat
                );
                ring.rotation.y = Math.PI / 2;
                ring.position.set(x - iLen * 0.42 + c * (iLen * 0.85 / 7), iRad + 1, z);
                city.add(ring);
            }

            [-iLen * 0.48, iLen * 0.48].forEach(ox => {
                const leg = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.4, iRad + 1, 6),
                    new THREE.MeshPhongMaterial({ color: 0xbbbbbb })
                );
                leg.position.set(x + ox, (iRad + 1) / 2, z);
                city.add(leg);
            });

        } else if (componentType === 3) {
            // ===== TỤ XANH LÁ (cây xanh) =====
            const ch = h * 1.2;
            const cw = w * 0.5;

            const body = new THREE.Mesh(
                new THREE.BoxGeometry(cw, ch, cw),
                new THREE.MeshPhongMaterial({ color: 0x2d7a2d, shininess: 30 })
            );
            body.position.set(x, ch / 2, z);
            city.add(body);

            const strip = new THREE.Mesh(
                new THREE.BoxGeometry(cw + 0.3, ch * 0.07, cw + 0.3),
                new THREE.MeshPhongMaterial({ color: 0x88cc88 })
            );
            strip.position.set(x, ch * 0.82, z);
            city.add(strip);

            [-cw * 0.28, cw * 0.28].forEach(ox => {
                const leg = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.35, 0.35, ch * 0.25, 6),
                    new THREE.MeshPhongMaterial({ color: 0xbbbbbb })
                );
                leg.position.set(x + ox, -(ch * 0.125), z);
                city.add(leg);
            });

        } else if (componentType === 4) {
            // ===== TỤ GỐM XANH =====
            const ch = h * 0.7;
            const cw = w * 0.55;

            const body = new THREE.Mesh(
                new THREE.BoxGeometry(cw * 1.4, ch * 0.4, cw),
                new THREE.MeshPhongMaterial({ color: 0x3399cc, shininess: 80 })
            );
            body.position.set(x, ch * 0.4 + 1, z);
            city.add(body);

            [-cw * 0.32, cw * 0.32].forEach(ox => {
                const leg = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.4, ch * 0.35, 6),
                    new THREE.MeshPhongMaterial({ color: 0xbbbbbb })
                );
                leg.position.set(x + ox, ch * 0.175, z);
                city.add(leg);
            });

        } else if (componentType === 5) {
            // ===== NHÀ PHỐ CỔ XÁM =====
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshPhongMaterial({ color: 0x888888 })
            );
            body.position.set(x, h / 2, z);
            city.add(body);

            const roof = new THREE.Mesh(
                new THREE.BoxGeometry(w + 1.5, 3, d + 1.5),
                new THREE.MeshLambertMaterial({ color: 0xcc3300 })
            );
            roof.position.set(x, h + 1.5, z);
            city.add(roof);

            const winMat = new THREE.MeshPhongMaterial({ color: 0xaaddff, shininess: 200 });
            for (let row = 0; row < 3; row++) {
                for (let col = -1; col <= 1; col++) {
                    const win = new THREE.Mesh(new THREE.BoxGeometry(w * 0.15, h * 0.1, 0.5), winMat);
                    win.position.set(x + col * w * 0.3, h * 0.25 + row * h * 0.28, z + d / 2 + 0.1);
                    city.add(win);
                }
            }

        } else if (componentType === 6) {
            // ===== TRANSISTOR BJT (TO-92) =====
            const tRad = h * 0.22;
            const tH   = h * 0.5;

            const tBody = new THREE.Mesh(
                new THREE.CylinderGeometry(tRad, tRad, tH, 16),
                new THREE.MeshPhongMaterial({ color: 0x222222, shininess: 60 })
            );
            tBody.position.set(x, tH / 2 + 1, z);
            city.add(tBody);

            const flatFace = new THREE.Mesh(
                new THREE.BoxGeometry(tRad * 2.05, tH, 0.6),
                new THREE.MeshPhongMaterial({ color: 0x444444 })
            );
            flatFace.position.set(x, tH / 2 + 1, z + tRad);
            city.add(flatFace);

            const bjt_labels = ['NPN', 'PNP', 'BC547', 'BC557', 'S9013', '2N2222'];
            const bjt_label = bjt_labels[Math.floor(Math.random() * bjt_labels.length)];
            (function() {
                const cv = document.createElement('canvas');
                cv.width = 128; cv.height = 256;
                const c = cv.getContext('2d');
                c.fillStyle = '#333333'; c.fillRect(0, 0, 128, 256);
                c.fillStyle = '#ffffff'; c.font = 'bold 28px monospace'; c.textAlign = 'center';
                c.fillText(bjt_label, 64, 115);
                c.font = '18px monospace'; c.fillStyle = '#aaffaa';
                c.fillText('BJT', 64, 155);
                const labelMesh = new THREE.Mesh(
                    new THREE.PlaneGeometry(tRad * 1.6, tH * 0.7),
                    new THREE.MeshPhongMaterial({ map: new THREE.CanvasTexture(cv), transparent: true })
                );
                labelMesh.position.set(x, tH / 2 + 1, z + tRad + 0.35);
                city.add(labelMesh);
            })();

            [-tRad * 0.6, 0, tRad * 0.6].forEach((ox, i) => {
                const pin = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.35, 0.35, tH * 0.55, 6),
                    new THREE.MeshPhongMaterial({ color: i === 1 ? 0xddaa00 : 0xbbbbbb, shininess: 180 })
                );
                pin.position.set(x + ox, -(tH * 0.275), z);
                city.add(pin);
            });

        } else if (componentType === 7) {
            // ===== MOSFET (TO-220) =====
            const mW = w * 0.55;
            const mH = h * 0.55;
            const mD = d * 0.35;

            const mBody = new THREE.Mesh(
                new THREE.BoxGeometry(mW, mH, mD),
                new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 20 })
            );
            mBody.position.set(x, mH / 2 + 1, z);
            city.add(mBody);

            const heatsink = new THREE.Mesh(
                new THREE.BoxGeometry(mW * 1.1, mH * 1.05, mD * 0.3),
                new THREE.MeshPhongMaterial({ color: 0xaaaaaa, shininess: 200 })
            );
            heatsink.position.set(x, mH / 2 + 1, z - mD * 0.65);
            city.add(heatsink);

            const hole = new THREE.Mesh(
                new THREE.CylinderGeometry(mW * 0.07, mW * 0.07, mD * 0.35, 8),
                new THREE.MeshPhongMaterial({ color: 0x333333 })
            );
            hole.rotation.x = Math.PI / 2;
            hole.position.set(x, mH * 0.85, z - mD * 0.65);
            city.add(hole);

            const mos_labels = ['IRF540', 'IRF3205', 'IRFZ44N', 'BS170', 'FQP30N06'];
            const mos_label = mos_labels[Math.floor(Math.random() * mos_labels.length)];
            (function() {
                const cv = document.createElement('canvas');
                cv.width = 256; cv.height = 256;
                const c = cv.getContext('2d');
                c.fillStyle = '#111111'; c.fillRect(0, 0, 256, 256);
                c.fillStyle = '#ffffff'; c.font = 'bold 32px monospace'; c.textAlign = 'center';
                c.fillText(mos_label, 128, 100);
                c.font = '20px monospace'; c.fillStyle = '#00ccff';
                c.fillText('N-MOSFET', 128, 148);
                c.fillStyle = '#ffaa00'; c.font = '18px monospace';
                c.fillText('G   D   S', 128, 195);
                const mosLabel = new THREE.Mesh(
                    new THREE.PlaneGeometry(mW * 0.85, mH * 0.65),
                    new THREE.MeshPhongMaterial({ map: new THREE.CanvasTexture(cv), transparent: true })
                );
                mosLabel.position.set(x, mH / 2 + 1, z + mD / 2 + 0.1);
                city.add(mosLabel);
            })();

            [-mW * 0.28, 0, mW * 0.28].forEach((ox, i) => {
                const pin = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.38, 0.38, mH * 0.5, 6),
                    new THREE.MeshPhongMaterial({ color: i === 0 ? 0xffcc00 : 0xbbbbbb, shininess: 180 })
                );
                pin.position.set(x + ox, -(mH * 0.25), z);
                city.add(pin);
            });

        } else {
            // ===== NHÀ PHỐ CỔ VÀNG =====
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshPhongMaterial({ color: 0xffdb58 })
            );
            body.position.set(x, h / 2, z);
            city.add(body);

            const roof = new THREE.Mesh(
                new THREE.BoxGeometry(w + 1.5, 3, d + 1.5),
                new THREE.MeshLambertMaterial({ color: 0xcc3300 })
            );
            roof.position.set(x, h + 1.5, z);
            city.add(roof);

            const winMat = new THREE.MeshPhongMaterial({ color: 0xaaddff, shininess: 200 });
            for (let row = 0; row < 3; row++) {
                for (let col = -1; col <= 1; col++) {
                    const win = new THREE.Mesh(new THREE.BoxGeometry(w * 0.15, h * 0.1, 0.5), winMat);
                    win.position.set(x + col * w * 0.3, h * 0.25 + row * h * 0.28, z + d / 2 + 0.1);
                    city.add(win);
                }
            }
        }
    } else { // Cao ốc mới → TỤ ĐIỆN HỘP
        h = 80 + Math.random() * 120;
        w = 20 + Math.random() * 10;
        d = 20 + Math.random() * 10;

        const capColors = [0x111111, 0x4a0e8f, 0x0a3d6b, 0x7a3b1e];
        const color = capColors[Math.floor(Math.random() * capColors.length)];

        // Giá trị uF ngẫu nhiên
        const ufValues = ['10µF', '22µF', '47µF', '100µF', '220µF', '470µF', '1000µF'];
        const voltValues = ['16V', '25V', '35V', '50V', '63V'];
        const ufLabel = ufValues[Math.floor(Math.random() * ufValues.length)];
        const vLabel = voltValues[Math.floor(Math.random() * voltValues.length)];

        // --- CANVAS TEXTURE cho mặt trước ---
        function makeCapTexture(bgColor, uf, volt) {
            const cv = document.createElement('canvas');
            cv.width = 256; cv.height = 512;
            const ctx = cv.getContext('2d');

            // Nền màu thân tụ
            const hexStr = '#' + bgColor.toString(16).padStart(6, '0');
            ctx.fillStyle = hexStr;
            ctx.fillRect(0, 0, 256, 512);

            // Dải sáng trên đỉnh (cực +)
            ctx.fillStyle = (bgColor === 0x111111) ? '#ffffff' : '#ffdd44';
            ctx.fillRect(0, 20, 256, 40);

            // Chữ uF - to, trắng/vàng
            ctx.fillStyle = (bgColor === 0x111111) ? '#ffffff' : '#ffe680';
            ctx.font = 'bold 72px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(uf, 128, 260);

            // Chữ volt - nhỏ hơn
            ctx.font = 'bold 44px monospace';
            ctx.fillStyle = '#aaaaaa';
            ctx.fillText(volt, 128, 330);

            // Logo tụ (hình 2 đường song song)
            ctx.strokeStyle = (bgColor === 0x111111) ? '#ffffff' : '#ffdd44';
            ctx.lineWidth = 8;
            ctx.beginPath(); ctx.moveTo(70, 390); ctx.lineTo(186, 390); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(70, 415); ctx.lineTo(186, 415); ctx.stroke();

            return new THREE.CanvasTexture(cv);
        }

        // --- CANVAS TEXTURE cho mặt bên DẤU TRỪ ---
        function makeMinusSideTexture(bgColor) {
            const cv = document.createElement('canvas');
            cv.width = 256; cv.height = 512;
            const ctx = cv.getContext('2d');

            const hexStr = '#' + bgColor.toString(16).padStart(6, '0');
            ctx.fillStyle = hexStr;
            ctx.fillRect(0, 0, 256, 512);

            // Dải xám (cực -)
            ctx.fillStyle = '#888888';
            ctx.fillRect(0, 20, 256, 50);

            // Dấu - lặp lại từ trên xuống
            ctx.fillStyle = '#cccccc';
            ctx.font = 'bold 52px monospace';
            ctx.textAlign = 'center';
            for (let i = 0; i < 6; i++) {
                ctx.fillText('−  −  −', 128, 100 + i * 70);
            }

            return new THREE.CanvasTexture(cv);
        }

        const frontTex = makeCapTexture(color, ufLabel, vLabel);
        const sideTex  = makeMinusSideTexture(color);
        const plainMat = new THREE.MeshPhongMaterial({ color: color, shininess: 40 });

        // BoxGeometry mặt: +X, -X, +Y, -Y, +Z(front), -Z
        const materials = [
            new THREE.MeshPhongMaterial({ map: sideTex }),   // +X (mặt bên - dấu trừ)
            plainMat,                                          // -X
            plainMat,                                          // +Y (đỉnh)
            plainMat,                                          // -Y (đáy)
            new THREE.MeshPhongMaterial({ map: frontTex }),  // +Z (mặt trước - chữ uF)
            plainMat,                                          // -Z
        ];

        const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), materials);
        body.position.set(x, h/2, z);
        city.add(body);

        // CHÂN TỤ TRÁI
        const legGeo = new THREE.BoxGeometry(2, h * 0.28, 2);
        const legMat = new THREE.MeshPhongMaterial({ color: 0xaaaaaa, shininess: 200 });
        const leg1 = new THREE.Mesh(legGeo, legMat);
        leg1.position.set(x - w * 0.22, -(h * 0.14), z);
        city.add(leg1);

        // CHÂN TỤ PHẢI
        const leg2 = new THREE.Mesh(legGeo, legMat);
        leg2.position.set(x + w * 0.22, -(h * 0.14), z);
        city.add(leg2);
    }
}

        // Tạo hồ nước
        const lake = new THREE.Mesh(
            new THREE.CircleGeometry(150, 32),
            new THREE.MeshPhongMaterial({ color: 0x224466, shininess: 100 })
        );
        lake.rotation.x = -Math.PI / 2;
        lake.position.y = 0.2;
        scene.add(lake);

        // Rải nhà theo quy hoạch
        for (let i = 0; i < 800; i++) {
            const x = (Math.random() - 0.5) * 1400;
            const z = (Math.random() - 0.5) * 1400;
            const dist = Math.sqrt(x*x + z*z);

            if (dist < 160) continue; // Chừa chỗ cho hồ

            if (x > 250 || z > 250) {
                addBuilding(x, z, 'new');
            } else {
                addBuilding(x, z, 'old');
            }
        }
        scene.add(city);

        // ============================================================
        // --- RỪNG CÂY XANH & VÁCH NÚI NGỌC RUBY ---
        // ============================================================
        const nature = new THREE.Group();

        // --- HÀM VẼ CÂY ---
        function addTree(x, z) {
            const trunkH = 6 + Math.random() * 8;
            const trunkR = 0.8 + Math.random() * 0.5;
            const trunkMat = new THREE.MeshPhongMaterial({ color: 0x5c3a1e });
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(trunkR * 0.6, trunkR, trunkH, 7),
                trunkMat
            );
            trunk.position.set(x, trunkH / 2, z);
            nature.add(trunk);

            // 3 tầng tán lá hình nón
            const leafColors = [0x1a7a2a, 0x228b22, 0x2d9e3a, 0x145214, 0x3cb371];
            const leafMat = new THREE.MeshPhongMaterial({
                color: leafColors[Math.floor(Math.random() * leafColors.length)],
                shininess: 20
            });
            const layers = 3;
            for (let i = 0; i < layers; i++) {
                const layerR = (3.5 - i * 0.7) + Math.random() * 1.2;
                const layerH = (5 + Math.random() * 3) - i * 0.5;
                const cone = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.1, layerR, layerH, 8),
                    leafMat
                );
                cone.position.set(x, trunkH + i * (layerH * 0.55), z);
                nature.add(cone);
            }
        }

        // --- HÀM VẼ VÁCH NÚI CÓ NGỌC RUBY ---
        function addRubyCliff(x, z) {
            const cliffW = 18 + Math.random() * 22;
            const cliffH = 25 + Math.random() * 40;
            const cliffD = 12 + Math.random() * 14;

            // Thân đá xám xanh
            const rockColors = [0x5a5a6a, 0x4a4a5a, 0x636373, 0x4e4e60];
            const rockMat = new THREE.MeshPhongMaterial({
                color: rockColors[Math.floor(Math.random() * rockColors.length)],
                shininess: 15
            });

            // Tạo khối núi từ nhiều box lệch nhau để trông thô ráp
            const baseBlock = new THREE.Mesh(
                new THREE.BoxGeometry(cliffW, cliffH, cliffD),
                rockMat
            );
            baseBlock.position.set(x, cliffH / 2, z);
            baseBlock.rotation.y = Math.random() * Math.PI;
            nature.add(baseBlock);

            // Thêm vài khối nhỏ lệch để tạo hình núi gồ ghề
            for (let b = 0; b < 3; b++) {
                const bw = cliffW * (0.4 + Math.random() * 0.4);
                const bh = cliffH * (0.3 + Math.random() * 0.5);
                const chunk = new THREE.Mesh(
                    new THREE.BoxGeometry(bw, bh, cliffD * 0.8),
                    rockMat
                );
                chunk.position.set(
                    x + (Math.random() - 0.5) * cliffW * 0.7,
                    bh / 2 + cliffH * 0.1,
                    z + (Math.random() - 0.5) * cliffD * 0.5
                );
                chunk.rotation.y = Math.random() * Math.PI;
                nature.add(chunk);
            }

            // --- TINH THỂ RUBY LẤP LÁNH ---
            const rubyMat = new THREE.MeshPhongMaterial({
                color: 0xcc0033,
                emissive: 0x880011,
                emissiveIntensity: 0.6,
                shininess: 400,
                specular: 0xff6688,
                transparent: true,
                opacity: 0.88
            });

            const numRubies = 4 + Math.floor(Math.random() * 6);
            for (let r = 0; r < numRubies; r++) {
                const rubyH = 1.5 + Math.random() * 3.5;
                const rubyR = 0.6 + Math.random() * 1.2;
                // Hình bát diện (2 hình chóp ghép đầu nhau)
                const topCone = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.05, rubyR, rubyH, 6),
                    rubyMat
                );
                const botCone = new THREE.Mesh(
                    new THREE.CylinderGeometry(rubyR, 0.05, rubyH * 0.6, 6),
                    rubyMat
                );
                const rubyGroup = new THREE.Group();
                topCone.position.y = rubyH * 0.3;
                botCone.position.y = -rubyH * 0.3;
                rubyGroup.add(topCone);
                rubyGroup.add(botCone);

                // Đặt ruby lên mặt đá, lệch ngẫu nhiên
                const rx = x + (Math.random() - 0.5) * cliffW * 0.8;
                const rz = z + (Math.random() - 0.5) * cliffD * 0.6;
                const ry = cliffH * (0.25 + Math.random() * 0.6);
                rubyGroup.position.set(rx, ry, rz);
                rubyGroup.rotation.set(
                    (Math.random() - 0.5) * 0.8,
                    Math.random() * Math.PI * 2,
                    (Math.random() - 0.5) * 0.5
                );
                nature.add(rubyGroup);

                // Ánh sáng đỏ nhỏ từ ruby
                if (r % 3 === 0) {
                    const rubyLight = new THREE.PointLight(0xff0033, 0.8, 40);
                    rubyLight.position.set(rx, ry + 2, rz);
                    nature.add(rubyLight);
                }
            }
        }

        // --- ZONE DEFINITIONS ---
        // Khu old: x < 250, z < 250
        // Khu new: x > 250 || z > 250
        // Rải cây và núi vào BỀ MẶT TRỐNG trong khoảng [-700, 700] x [-700, 700]
        // Tránh: hồ (r<160), tránh zone dày đặc building (dùng xác suất phân bố)

        // Hàm kiểm tra có nên đặt thiên nhiên tại điểm này không
        function isGoodNatureSpot(x, z) {
            const dist = Math.sqrt(x * x + z * z);
            // Tránh hồ
            if (dist < 170) return false;
            // Phải trong bản đồ
            if (Math.abs(x) > 680 || Math.abs(z) > 680) return false;
            return true;
        }

        // Rải cây: ưu tiên vùng BIÊN của 2 khu tòa nhà (nơi ít tòa nhà hơn)
        // Khu old (x<250, z<250): rải cây xung quanh tòa nhà
        // Khu new (x>250||z>250): rải cây và vách núi quanh cao ốc

        const treePositions = new Set();

        function rng2(x, z, seed) {
            // Deterministic pseudo-random để tránh overlap
            return ((Math.sin(x * 12.9898 + z * 78.233 + seed) * 43758.5453) % 1 + 1) % 1;
        }

        // Rải cây theo lưới ngẫu nhiên với jitter
        const GRID_STEP = 28;
        for (let gx = -680; gx <= 680; gx += GRID_STEP) {
            for (let gz = -680; gz <= 680; gz += GRID_STEP) {
                // Jitter vị trí
                const jx = gx + (Math.random() - 0.5) * GRID_STEP * 0.85;
                const jz = gz + (Math.random() - 0.5) * GRID_STEP * 0.85;

                if (!isGoodNatureSpot(jx, jz)) continue;

                // Xác suất đặt cây cao hơn ở vùng ít building (biên giữa 2 zone)
                // Giảm mật độ cây ở vùng dày đặc cao ốc (|x|>400 && |z|>400)
                const isDeepNew = (Math.abs(jx) > 400 && Math.abs(jz) > 400);
                const isOldZone = (jx < 250 && jz < 250);
                const prob = isDeepNew ? 0.12 : (isOldZone ? 0.22 : 0.30);

                if (Math.random() < prob) {
                    addTree(jx, jz);
                }
            }
        }

        // Rải cụm cây dày hơn ở vùng biên giữa 2 khu (khoảng x=200-350, z=200-350)
        for (let i = 0; i < 120; i++) {
            const jx = 150 + Math.random() * 250 - (Math.random() < 0.5 ? 350 : 0);
            const jz = 150 + Math.random() * 250 - (Math.random() < 0.5 ? 350 : 0);
            if (isGoodNatureSpot(jx, jz)) {
                addTree(jx, jz);
            }
        }

        // Rải vách núi có ruby: ưu tiên khu biên ngoài và góc bản đồ
        const cliffSpots = [];
        for (let i = 0; i < 55; i++) {
            let cx, cz;
            // Phân bố: 60% ở ngoại ô (r=450-650), 40% ở trong (r=200-450)
            if (Math.random() < 0.6) {
                const angle = Math.random() * Math.PI * 2;
                const r = 450 + Math.random() * 200;
                cx = Math.cos(angle) * r;
                cz = Math.sin(angle) * r;
            } else {
                cx = (Math.random() - 0.5) * 700;
                cz = (Math.random() - 0.5) * 700;
            }
            if (isGoodNatureSpot(cx, cz)) {
                addRubyCliff(cx, cz);
                cliffSpots.push({ x: cx, z: cz });
            }
        }

        scene.add(nature);

        // Animate ruby glow (pulsate emissive) — lưu ruby meshes
        // Collect tất cả ruby mesh để animate
        const rubyMeshes = [];
        nature.traverse(obj => {
            if (obj.isMesh && obj.material && obj.material.emissive &&
                obj.material.color && obj.material.color.r > 0.5 &&
                obj.material.color.g < 0.1) {
                rubyMeshes.push(obj);
            }
        });

        // ============================================================
        // --- GIAO THÔNG: Ô TÔ, XE MÁY, NGƯỜI ĐI BỘ ---
        // ============================================================

        const traffic = []; // mảng lưu tất cả phương tiện

        // --- TẠO Ô TÔ ---
        function createCar() {
            const group = new THREE.Group();
            const carColors = [0xcc2200, 0x0044cc, 0xffffff, 0x222222, 0xffcc00, 0x006633, 0xff6600, 0x880088];
            const bodyColor = carColors[Math.floor(Math.random() * carColors.length)];

            // Thân xe dưới
            const bodyLow = new THREE.Mesh(
                new THREE.BoxGeometry(7, 2.2, 3.5),
                new THREE.MeshPhongMaterial({ color: bodyColor, shininess: 120 })
            );
            bodyLow.position.y = 1.5;
            group.add(bodyLow);

            // Thân xe trên (cabin)
            const bodyTop = new THREE.Mesh(
                new THREE.BoxGeometry(4.5, 2, 3.2),
                new THREE.MeshPhongMaterial({ color: bodyColor, shininess: 120 })
            );
            bodyTop.position.set(-0.3, 3.3, 0);
            group.add(bodyTop);

            // Kính chắn gió (xanh nhạt)
            const glassMat = new THREE.MeshPhongMaterial({ color: 0xaaddff, transparent: true, opacity: 0.7, shininess: 200 });
            const windshield = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.6, 2.8), glassMat);
            windshield.position.set(1.9, 3.3, 0);
            group.add(windshield);

            // Bánh xe (4 cái)
            const wheelGeo = new THREE.CylinderGeometry(0.9, 0.9, 0.7, 12);
            const wheelMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            [[-2.5, 0, 2], [2.5, 0, 2], [-2.5, 0, -2], [2.5, 0, -2]].forEach(([wx, wy, wz]) => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.x = Math.PI / 2;
                wheel.position.set(wx, 0.9, wz);
                group.add(wheel);
            });

            // Đèn trước (vàng)
            const headlightMat = new THREE.MeshPhongMaterial({ color: 0xffffaa, emissive: 0xffff44, emissiveIntensity: 0.8 });
            [-1.1, 1.1].forEach(oz => {
                const light = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.8), headlightMat);
                light.position.set(3.5, 1.8, oz);
                group.add(light);
            });

            // Đèn hậu (đỏ)
            const taillightMat = new THREE.MeshPhongMaterial({ color: 0xff2200, emissive: 0xff0000, emissiveIntensity: 0.5 });
            [-1.1, 1.1].forEach(oz => {
                const tlight = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.8), taillightMat);
                tlight.position.set(-3.5, 1.8, oz);
                group.add(tlight);
            });

            return group;
        }

        // --- TẠO XE MÁY ---
        function createMotorbike() {
            const group = new THREE.Group();
            const motoColors = [0xcc0000, 0x0055ff, 0x111111, 0xffaa00, 0x009944];

                const wheel = new THREE.Mesh(wheelGeo, wheelMat);

        // --- TẠO NGƯỜI ĐI BỘ ---
        function createPedestrian() {
            const group = new THREE.Group();
            const skinColors = [0xffcc99, 0xcc9966, 0xffaa77];
            const shirtColors = [0xff4444, 0x4444ff, 0x44aa44, 0xffffff, 0xff9900, 0x9900cc, 0x00cccc];
            const pantColors  = [0x223355, 0x111111, 0x553322, 0x445533];

            const skin  = skinColors [Math.floor(Math.random() * skinColors.length)];
            const shirt = shirtColors[Math.floor(Math.random() * shirtColors.length)];
            const pant  = pantColors [Math.floor(Math.random() * pantColors.length)];

            // Chân
            [-0.3, 0.3].forEach(ox => {
                const leg = new THREE.Mesh(
                    new THREE.BoxGeometry(0.4, 1.4, 0.4),
                    new THREE.MeshPhongMaterial({ color: pant })
                );
                leg.position.set(ox, 0.7, 0);
                group.add(leg);
            });

            // Thân
            const torso = new THREE.Mesh(
                new THREE.BoxGeometry(0.9, 1.4, 0.5),
                new THREE.MeshPhongMaterial({ color: shirt })
            );
            torso.position.y = 2.1;
            group.add(torso);

            // Tay
            [-0.7, 0.7].forEach(ox => {
                const arm = new THREE.Mesh(
                    new THREE.BoxGeometry(0.35, 1.1, 0.35),
                    new THREE.MeshPhongMaterial({ color: shirt })
                );
                arm.position.set(ox, 2.1, 0);
                group.add(arm);
            });

            // Đầu
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.45, 8, 8),
                new THREE.MeshPhongMaterial({ color: skin })
            );
            head.position.y = 3.35;
            group.add(head);

            return group;
        }

        // --- THU THẬP VỊ TRÍ CHƯỚNG NGẠI VẬT (tòa nhà) ---
        // Dùng bounding circle đơn giản cho mỗi building dựa trên x,z đã spawn
        const obstacles = []; // { x, z, r }
        const LAKE_R = 162; // bán kính hồ + buffer

        // Hàm kiểm tra vị trí có hợp lệ không (tránh hồ, tránh biên)
        function isValidSpawn(x, z) {
            const distLake = Math.sqrt(x * x + z * z);
            if (distLake < LAKE_R + 20) return false;
            if (Math.abs(x) > 680 || Math.abs(z) > 680) return false;
            return true;
        }

        // Hàm tìm vị trí spawn hợp lệ
        function randomValidPos(minR, maxR) {
            let x, z, tries = 0;
            do {
                const angle = Math.random() * Math.PI * 2;
                const r = minR + Math.random() * (maxR - minR);
                x = Math.cos(angle) * r + (Math.random() - 0.5) * 40;
                z = Math.sin(angle) * r + (Math.random() - 0.5) * 40;
                tries++;
            } while (!isValidSpawn(x, z) && tries < 30);
            return { x, z };
        }

        // --- KHỞI TẠO PHƯƠNG TIỆN ---
        // Ô tô: 17 chiếc (giảm một nửa từ 35)
        for (let i = 0; i < 17; i++) {
            const car = createCar();
            const pos = randomValidPos(170, 650);
            const angle = Math.atan2(pos.z, pos.x);
            const dir = (Math.random() > 0.5 ? 1 : -1);
            const speed = (0.12 + Math.random() * 0.12) * dir; // đơn vị world/frame
            car.position.set(pos.x, 0, pos.z);
            car.rotation.y = -angle + (dir < 0 ? Math.PI : 0);
            scene.add(car);
            traffic.push({
                mesh: car,
                type: 'car',
                vx: Math.cos(-angle + (dir < 0 ? Math.PI : 0)) * Math.abs(speed),
                vz: -Math.sin(-angle + (dir < 0 ? Math.PI : 0)) * Math.abs(speed),
                baseSpeed: Math.abs(speed),
                wobble: Math.random() * Math.PI * 2,
                stepPhase: 0,
                turnTimer: 0,
                turnInterval: 180 + Math.random() * 300
            });
        }

        // Xe máy: 30 chiếc (giảm một nửa từ 60)
        for (let i = 0; i < 30; i++) {
            const moto = createMotorbike();
            const pos = randomValidPos(170, 650);
            const angle = Math.atan2(pos.z, pos.x);
            const dir = (Math.random() > 0.5 ? 1 : -1);
            const speed = (0.18 + Math.random() * 0.15) * dir;
            moto.position.set(pos.x, 0, pos.z);
            moto.rotation.y = -angle + (dir < 0 ? Math.PI : 0);
            scene.add(moto);
            traffic.push({
                mesh: moto,
                type: 'moto',
                vx: Math.cos(-angle + (dir < 0 ? Math.PI : 0)) * Math.abs(speed),
                vz: -Math.sin(-angle + (dir < 0 ? Math.PI : 0)) * Math.abs(speed),
                baseSpeed: Math.abs(speed),
                wobble: Math.random() * Math.PI * 2,
                stepPhase: 0,
                turnTimer: 0,
                turnInterval: 120 + Math.random() * 200
            });
        }

        // Người đi bộ: 20 người (giảm một nửa từ 40)
        for (let i = 0; i < 20; i++) {
            const ped = createPedestrian();
            const pos = randomValidPos(170, 650);
            const angle = Math.atan2(pos.z, pos.x);
            const dir = (Math.random() > 0.5 ? 1 : -1);
            const speed = (0.04 + Math.random() * 0.03) * dir;
            ped.position.set(pos.x, 0, pos.z);
            ped.rotation.y = -angle + (dir < 0 ? Math.PI : 0);
            scene.add(ped);
            traffic.push({
                mesh: ped,
                type: 'ped',
                vx: Math.cos(-angle + (dir < 0 ? Math.PI : 0)) * Math.abs(speed),
                vz: -Math.sin(-angle + (dir < 0 ? Math.PI : 0)) * Math.abs(speed),
                baseSpeed: Math.abs(speed),
                wobble: Math.random() * Math.PI * 2,
                stepPhase: Math.random() * Math.PI * 2,
                turnTimer: 0,
                turnInterval: 60 + Math.random() * 120
            });
        }

        // --- UPDATE GIAO THÔNG MỖI FRAME với STEERING ---
        function updateTraffic() {
            traffic.forEach(v => {
                const pos = v.mesh.position;
                v.wobble += 0.05;
                v.turnTimer++;

                // --- STEERING: tránh hồ ---
                const distLake = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
                if (distLake < LAKE_R + 25) {
                    // Đẩy ra ngoài: xoay velocity ngược hướng tâm hồ
                    const nx = pos.x / distLake;
                    const nz = pos.z / distLake;
                    const dot = v.vx * nx + v.vz * nz;
                    // Trừ phần tiếp xúc vào hồ, thêm phần tiếp tuyến
                    v.vx += -dot * nx * 0.4 + nz * v.baseSpeed * 0.3;
                    v.vz += -dot * nz * 0.4 - nx * v.baseSpeed * 0.3;
                }

                // --- STEERING: tránh biên bản đồ ---
                const BORDER = 660;
                if (pos.x > BORDER)  v.vx -= 0.08;
                if (pos.x < -BORDER) v.vx += 0.08;
                if (pos.z > BORDER)  v.vz -= 0.08;
                if (pos.z < -BORDER) v.vz += 0.08;

                // --- STEERING: tránh tòa nhà (dùng obstacle list) ---
                // Scan nhanh các obstacle gần nhất (không dùng vòng lặp toàn bộ 800 nhà)
                // Thay vào đó dùng grid check đơn giản: nếu vị trí mới bị block thì quẹo
                const CLEARANCE = v.type === 'car' ? 18 : (v.type === 'moto' ? 12 : 8);
                // Kiểm tra ô lưới quanh vị trí tiếp theo
                const nextX = pos.x + v.vx;
                const nextZ = pos.z + v.vz;
                // Đơn giản: nếu vị trí tiếp theo nằm trong cluster tòa nhà (x>250 || z>250 = new building zone)
                // dùng noise-based deflection — xoay nhẹ velocity theo wobble
                const inDenseZone = (Math.abs(nextX) > 240 || Math.abs(nextZ) > 240);
                if (inDenseZone) {
                    // Thêm lực lắc để mô phỏng tránh nhà
                    const wobbleTurn = Math.sin(v.wobble * 1.7) * 0.06;
                    const cosW = Math.cos(wobbleTurn), sinW = Math.sin(wobbleTurn);
                    const newVx = v.vx * cosW - v.vz * sinW;
                    const newVz = v.vx * sinW + v.vz * cosW;
                    v.vx = newVx; v.vz = newVz;
                }

                // --- Thỉnh thoảng đổi hướng ngẫu nhiên (như chuyển làn) ---
                if (v.turnTimer > v.turnInterval) {
                    v.turnTimer = 0;
                    v.turnInterval = (v.type === 'car' ? 180 : v.type === 'moto' ? 120 : 60) + Math.random() * 200;
                    const turnAmt = (Math.random() - 0.5) * (v.type === 'ped' ? 1.2 : 0.5);
                    const cosT = Math.cos(turnAmt), sinT = Math.sin(turnAmt);
                    const newVx = v.vx * cosT - v.vz * sinT;
                    const newVz = v.vx * sinT + v.vz * cosT;
                    v.vx = newVx; v.vz = newVz;
                }

                // --- Chuẩn hóa tốc độ (giữ baseSpeed) ---
                const curSpeed = Math.sqrt(v.vx * v.vx + v.vz * v.vz);
                if (curSpeed > 0.001) {
                    v.vx = (v.vx / curSpeed) * v.baseSpeed;
                    v.vz = (v.vz / curSpeed) * v.baseSpeed;
                }

                // --- Di chuyển ---
                pos.x += v.vx;
                pos.z += v.vz;

                // --- Xoay mặt theo hướng đi ---
                if (curSpeed > 0.001) {
                    // Car/moto model dài theo trục X (đèn trước ở +X) → cần offset thêm PI/2
                    const modelOffset = (v.type === 'ped') ? 0 : Math.PI / 2;
                    const targetAngle = Math.atan2(v.vx, v.vz) - modelOffset;
                    let curAngle = v.mesh.rotation.y;
                    let diff = targetAngle - curAngle;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    const lerpRate = v.type === 'car' ? 0.06 : v.type === 'moto' ? 0.09 : 0.12;
                    v.mesh.rotation.y += diff * lerpRate;
                }

                // --- Người đi bộ: nhún chân ---
                if (v.type === 'ped') {
                    v.stepPhase += 0.15;
                    pos.y = Math.abs(Math.sin(v.stepPhase)) * 0.25;
                } else {
                    pos.y = 0;
                }
            });
        }

        // ============================================================
        // --- THÊM CHỮ EMIN VÀO CÁC TÒA NHÀ CAO ỐC (type 'new') ---
        // ============================================================
        const eminNames = [
            'Emin Hà Nội', 'Emin HCM', 'Emin Bắc Ninh',
            'Emin Hải Phòng', 'Emin Đà Nẵng', 'Emin Đồng Nai'
        ];

        function addEminLabel(x, z, h, w, d) {
            const name = eminNames[Math.floor(Math.random() * eminNames.length)];
            const cv = document.createElement('canvas');
            cv.width = 512; cv.height = 256;
            const ctx = cv.getContext('2d');

            // Nền trong suốt
            ctx.clearRect(0, 0, 512, 256);

            // Bo góc nền tối bán trong suốt
            ctx.fillStyle = 'rgba(0,0,0,0.72)';
            ctx.roundRect(8, 8, 496, 240, 18);
            ctx.fill();

            // Viền neon xanh
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 5;
            ctx.roundRect(8, 8, 496, 240, 18);
            ctx.stroke();

            // Chữ EMIN to, gradient xanh neon
            const grad = ctx.createLinearGradient(0, 40, 0, 150);
            grad.addColorStop(0, '#00ffee');
            grad.addColorStop(1, '#0099ff');
            ctx.fillStyle = grad;
            ctx.font = 'bold 90px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('EMIN', 256, 130);

            // Dòng tên chi nhánh nhỏ hơn
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 38px Arial';
            const branch = name.replace('Emin ', '');
            ctx.fillText(branch, 256, 195);

            const tex = new THREE.CanvasTexture(cv);
            const labelW = w * 1.1;
            const labelH = h * 0.22;

            // Gán lên mặt trước (z+)
            const label = new THREE.Mesh(
                new THREE.PlaneGeometry(labelW, labelH),
                new THREE.MeshPhongMaterial({ map: tex, transparent: true, depthWrite: false })
            );
            label.position.set(x, h * 0.6, z + d / 2 + 0.5);
            city.add(label);

            // Mặt sau (z-)
            const labelBack = label.clone();
            labelBack.position.set(x, h * 0.6, z - d / 2 - 0.5);
            labelBack.rotation.y = Math.PI;
            city.add(labelBack);
        }

        // Gắn Emin label vào 1/3 tòa nhà mới (cao ốc)
        (function attachEminLabels() {
            // Re-scan và thêm label sau khi city đã build
            // Vì city group chứa nhiều mesh, ta build một pass riêng
            // Spawn thêm label objects tại vị trí cao ốc đã tạo
            const usedPositions = [];
            for (let i = 0; i < 800; i++) {
                const x = (Math.random() - 0.5) * 1400;
                const z = (Math.random() - 0.5) * 1400;
                const dist = Math.sqrt(x * x + z * z);
                if (dist < 160) continue;
                if (x > 250 || z > 250) {
                    if (Math.random() < 0.35) {
                        const h = 80 + Math.random() * 120;
                        const w = 20 + Math.random() * 10;
                        const d = 20 + Math.random() * 10;
                        addEminLabel(x, z, h, w, d);
                    }
                }
            }
        })();

        // ============================================================
        // --- CAMERA DRONE FLIGHT SYSTEM ---
        // ============================================================

        // Khu vực OLD (x < 250 và z < 250)
        const OLD_ZONE = { minX: -700, maxX: 249, minZ: -700, maxZ: 249 };

        // Waypoint system cho chế độ lướt thấp khu OLD
        let droneWaypoints = [];
        let droneWpIdx = 0;
        let droneWpProgress = 0;

        function generateOldZoneWaypoints(count) {
            const pts = [];
            for (let i = 0; i < count; i++) {
                let x, z, tries = 0;
                do {
                    x = OLD_ZONE.minX + Math.random() * (OLD_ZONE.maxX - OLD_ZONE.minX);
                    z = OLD_ZONE.minZ + Math.random() * (OLD_ZONE.maxZ - OLD_ZONE.minZ);
                    tries++;
                } while (Math.sqrt(x*x+z*z) < 170 && tries < 30);
                // Độ cao lướt thấp ngẫu nhiên: 10-30
                const y = 10 + Math.random() * 20;
                pts.push(new THREE.Vector3(x, y, z));
            }
            return pts;
        }

        // Trạng thái camera
        // PHASES: HIGH_ORBIT → DESCEND → LOW_GLIDE (5 vòng) → ASCEND → HIGH_OVERVIEW → DESCEND → ...
        let camPhase = 'HIGH_ORBIT';
        let phaseTimer = 0;
        let orbitAngle = 0;
        let orbitLaps = 0;          // đếm số lần lap HIGH_ORBIT
        let lowGlideLaps = 0;       // đếm vòng lướt thấp
        let lowGlideTimer = 0;
        let lowGlideSegCount = 0;   // số segment đã đi (mỗi ~3-5 segment = 1 "vòng")

        // Waypoints cho khu old
        droneWaypoints = generateOldZoneWaypoints(40);
        droneWpIdx = 0;
        droneWpProgress = 0;

        // Vị trí camera hiện tại (để lerp mượt)
        const camPos = new THREE.Vector3(0, 700, 0);
        const camTarget = new THREE.Vector3(0, 0, 0);

        // HIGH_OVERVIEW: danh sách các vị trí cao ốc để zoom qua
        const overviewTargets = [
            new THREE.Vector3(400, 0, 400),
            new THREE.Vector3(-400, 0, 400),
            new THREE.Vector3(400, 0, -300),
            new THREE.Vector3(-350, 0, -350),
            new THREE.Vector3(500, 0, -200),
        ];
        let overviewIdx = 0;
        let overviewTimer = 0;

        function animate() {
            requestAnimationFrame(animate);
            phaseTimer++;

            // ---- HIGH_ORBIT: bay vòng cao nhìn xuống toàn cảnh ----
            if (camPhase === 'HIGH_ORBIT') {
                orbitAngle += 0.004;
                const r = 850;
                const targetPos = new THREE.Vector3(
                    Math.sin(orbitAngle) * r,
                    560 + Math.sin(orbitAngle * 0.3) * 80,
                    Math.cos(orbitAngle) * r
                );
                camPos.lerp(targetPos, 0.04);
                camTarget.lerp(new THREE.Vector3(0, 50, 0), 0.05);
                camera.position.copy(camPos);
                camera.lookAt(camTarget);

                // Sau ~1 vòng → bắt đầu xuống
                if (orbitAngle > Math.PI * 2) {
                    orbitAngle = 0;
                    camPhase = 'DESCEND';
                    phaseTimer = 0;
                    droneWaypoints = generateOldZoneWaypoints(40);
                    droneWpIdx = 0;
                    droneWpProgress = 0;
                    lowGlideSegCount = 0;
                }
            }

            // ---- DESCEND: lao xuống khu old ----
            else if (camPhase === 'DESCEND') {
                const firstWp = droneWaypoints[0];
                const approachPos = new THREE.Vector3(firstWp.x, 15, firstWp.z);
                camPos.lerp(approachPos, 0.025);
                camTarget.lerp(droneWaypoints[1] || firstWp, 0.03);
                camera.position.copy(camPos);
                camera.lookAt(camTarget);

                if (camPos.distanceTo(approachPos) < 30) {
                    camPhase = 'LOW_GLIDE';
                    phaseTimer = 0;
                }
            }

            // ---- LOW_GLIDE: lướt thấp khu old, rẽ ngẫu nhiên ----
            else if (camPhase === 'LOW_GLIDE') {
                droneWpProgress += 0.003;

                if (droneWpProgress >= 1) {
                    droneWpProgress = 0;
                    droneWpIdx++;
                    lowGlideSegCount++;

                    // Sau ~5 vòng (mỗi vòng ~8 segment) thì bay lên
                    if (lowGlideSegCount >= 40) {
                        lowGlideSegCount = 0;
                        camPhase = 'ASCEND';
                        phaseTimer = 0;
                    } else if (droneWpIdx >= droneWaypoints.length - 1) {
                        // Hết waypoint thì gen mới
                        droneWaypoints = generateOldZoneWaypoints(40);
                        droneWpIdx = 0;
                    }
                }

                const wpA = droneWaypoints[droneWpIdx];
                const wpB = droneWaypoints[Math.min(droneWpIdx + 1, droneWaypoints.length - 1)];
                const wpC = droneWaypoints[Math.min(droneWpIdx + 2, droneWaypoints.length - 1)];

                // Interpolate mượt (catmull-rom đơn giản với lerp)
                const t = droneWpProgress;
                const currentPos = new THREE.Vector3().lerpVectors(wpA, wpB, t);
                // Nhấp nhô thêm để giống bay lướt
                currentPos.y += Math.sin(t * Math.PI * 2 + phaseTimer * 0.05) * 3;

                camPos.lerp(currentPos, 0.03);
                const lookAheadPos = new THREE.Vector3().lerpVectors(wpB, wpC, t);
                lookAheadPos.y = currentPos.y - 2; // nhìn hơi cúi
                camTarget.lerp(lookAheadPos, 0.03);

                camera.position.copy(camPos);
                camera.lookAt(camTarget);
            }

            // ---- ASCEND: bay lên cao lại ----
            else if (camPhase === 'ASCEND') {
                const highPos = new THREE.Vector3(
                    camPos.x * 0.3 + Math.sin(phaseTimer * 0.01) * 600,
                    700,
                    camPos.z * 0.3 + Math.cos(phaseTimer * 0.01) * 600
                );
                camPos.lerp(highPos, 0.02);
                camTarget.lerp(new THREE.Vector3(0, 0, 0), 0.02);
                camera.position.copy(camPos);
                camera.lookAt(camTarget);

                if (camPos.y > 500) {
                    camPhase = 'HIGH_OVERVIEW';
                    phaseTimer = 0;
                    overviewIdx = 0;
                    overviewTimer = 0;
                }
            }

            // ---- HIGH_OVERVIEW: lượn cao qua các tòa cao ốc ----
            else if (camPhase === 'HIGH_OVERVIEW') {
                overviewTimer++;

                const target = overviewTargets[overviewIdx % overviewTargets.length];
                const viewPos = new THREE.Vector3(
                    target.x + Math.sin(overviewTimer * 0.006) * 300,
                    350 + Math.sin(overviewTimer * 0.008) * 100,
                    target.z + Math.cos(overviewTimer * 0.006) * 300
                );
                camPos.lerp(viewPos, 0.008);
                camTarget.lerp(new THREE.Vector3(target.x, 80, target.z), 0.02);
                camera.position.copy(camPos);
                camera.lookAt(camTarget);

                // Mỗi 4 giây chuyển target cao ốc tiếp theo, sau 5 target thì về orbit
                if (overviewTimer % 321 === 0) {
                    overviewIdx++;
                    if (overviewIdx >= overviewTargets.length) {
                        camPhase = 'HIGH_ORBIT';
                        phaseTimer = 0;
                        orbitAngle = 0;
                    }
                }
            }

            // Ruby pulsate
            const rubyPulse = 0.4 + Math.sin(Date.now() * 0.003) * 0.35;
            for (let rm of rubyMeshes) {
                rm.material.emissiveIntensity = rubyPulse;
            }

            updateTraffic();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
