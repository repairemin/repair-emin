<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Component City V2 - Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="banner-container">
        <div class="ui-overlay">
            <h1>HARDWARE CITY OS</h1>
            <p>SYSTEM STATUS: ONLINE</p>
        </div>

        <canvas id="pcb-canvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script>
        // --- 1. Thiết lập Scene, Camera, Renderer ---
        const canvas = document.getElementById('pcb-canvas');
        const container = document.querySelector('.banner-container');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); // Nền đen

        // Camera
        const camera = new THREE.PerspectiveCamera(
            50, // Fov
            container.clientWidth / container.clientHeight, // Aspect Ratio
            0.1, // Near plane
            1000 // Far plane
        );
        camera.position.set(0, 5, 10); // Đặt camera ở trên và lùi lại

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Cho màn hình retina

        // --- 2. Tạo PCB (mặt phẳng chứa hình) ---
        
        // Tải texture hình ảnh PCB của bạn
        const textureLoader = new THREE.TextureLoader();
        // **QUAN TRỌNG**: Thay đổi đường dẫn này thành đường dẫn đến file hình ảnh của bạn.
        const pcbTexture = textureLoader.load('path/to/your/texture.png'); 

        const geometry = new THREE.PlaneGeometry(10, 8); // Kích thước mặt phẳng (rộng, cao)
        const material = new THREE.MeshBasicMaterial({ 
            map: pcbTexture,
            side: THREE.DoubleSide // Nhìn được cả 2 mặt
        });
        const pcbPlane = new THREE.Mesh(geometry, material);
        
        // Xoay mặt phẳng nằm ngang
        pcbPlane.rotation.x = -Math.PI / 2; 
        scene.add(pcbPlane);

        // --- 3. Animation: Xoay Camera quanh PCB ---
        let angle = 0;
        const radius = 10; // Bán kính vòng quay

        function animate() {
            requestAnimationFrame(animate);

            // Tăng góc xoay theo thời gian
            angle += 0.005; // Tốc độ xoay (thay đổi giá trị này)

            // Tính toán vị trí camera theo hình tròn
            camera.position.x = radius * Math.sin(angle);
            camera.position.z = radius * Math.cos(angle);
            
            // Giữ camera luôn nhìn vào tâm PCB
            camera.lookAt(pcbPlane.position);

            renderer.render(scene, camera);
        }

        animate();

        // --- 4. Xử lý khi resize cửa sổ ---
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();

            renderer.setSize(width, height);
        });

    </script>
</body>
</html>
