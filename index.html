<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tiến Thắng Center | Next-Gen 3D PCB</title>
    <style>
        body { margin: 0; background: radial-gradient(circle at center, #001520 0%, #000 100%); overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #hud {
            position: absolute; top: 40px; left: 40px; color: #00f2ff;
            z-index: 10; pointer-events: none;
        }
        .glitch {
            font-size: 3rem; font-weight: 900; letter-spacing: 10px;
            text-transform: uppercase; margin: 0;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; }
            to { text-shadow: 0 0 20px #00f2ff, 0 0 40px #00f2ff; }
        }
        .status-box {
            margin-top: 15px; padding: 15px; border: 1px solid rgba(0, 242, 255, 0.3);
            background: rgba(0, 30, 40, 0.5); backdrop-filter: blur(10px);
            font-family: monospace; font-size: 0.8rem; line-height: 1.6;
        }
    </style>
</head>
<body>

    <div id="hud">
        <h1 class="glitch">Tiến Thắng</h1>
        <div class="status-box">
            > SCANNING MAINBOARD... [OK]<br>
            > ANALYZING KONICA SENSOR... [ACTIVE]<br>
            > VOLTAGE STABILITY: 99.8%<br>
            > REPAIR MODE: HI-TECH CALIBRATION
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, board, atoms = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(60, 50, 80);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. Tạo Mainboard PCB "Luxury"
            const boardGeom = new THREE.BoxGeometry(50, 1.5, 70);
            const boardMat = new THREE.MeshStandardMaterial({ 
                color: 0x001111, 
                metalness: 0.9, 
                roughness: 0.1,
                transparent: true,
                opacity: 0.9
            });
            board = new THREE.Mesh(boardGeom, boardMat);
            scene.add(board);

            // Thêm các chip IC lớn cố định
            const icGeom = new THREE.BoxGeometry(10, 2, 10);
            const icMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1 });
            const mainChip = new THREE.Mesh(icGeom, icMat);
            mainChip.position.y = 1.5;
            board.add(mainChip);

            // 2. Các hạt "Năng lượng" (Data Flow)
            const pointsGeom = new THREE.BufferGeometry();
            const count = 3000;
            const positions = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) {
                positions[i] = (Math.random() - 0.5) * 200;
            }
            pointsGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const pointsMat = new THREE.PointsMaterial({ size: 0.4, color: 0x00f2ff, transparent: true, blending: THREE.AdditiveBlending });
            const starField = new THREE.Points(pointsGeom, pointsMat);
            scene.add(starField);

            // 3. Linh kiện bay kiểu Matrix
            for(let i=0; i<30; i++) {
                const geometry = new THREE.IcosahedronGeometry(Math.random() * 2, 0);
                const material = new THREE.MeshPhongMaterial({ 
                    color: 0x00f2ff, 
                    emissive: 0x004444,
                    wireframe: true 
                });
                const part = new THREE.Mesh(geometry, material);
                part.position.set((Math.random()-0.5)*100, (Math.random()*100), (Math.random()-0.5)*100);
                part.velocity = Math.random() * 0.02 + 0.01;
                scene.add(part);
                atoms.push(part);
            }

            // Ánh sáng điểm nhấn
            const blueLight = new THREE.PointLight(0x00f2ff, 2, 200);
            blueLight.position.set(0, 20, 0);
            scene.add(blueLight);
            scene.add(new THREE.AmbientLight(0x222222));
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.001;

            // Board xoay và nghiêng nghệ thuật
            board.rotation.y = Math.sin(t * 0.5) * 0.2;
            board.rotation.x = Math.cos(t * 0.3) * 0.1;

            // Linh kiện bay hội tụ
            atoms.forEach((a, i) => {
                a.position.y -= a.velocity * 5;
                a.rotation.x += 0.01;
                if(a.position.y < -20) a.position.y = 100;
            });

            camera.lookAt(board.position);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
