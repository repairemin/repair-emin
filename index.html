<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Component City Banner</title>
    <style>
        /* Tối ưu hóa hiển thị toàn màn hình */
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        /* Giao diện UI nằm đè lên Banner 3D */
        #ui-overlay {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            pointer-events: none; /* Cho phép click xuyên qua UI xuống 3D */
            width: 90%;
            max-w: 800px;
        }

        #ui-overlay h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff, #88fbff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #ui-overlay p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ccc;
        }

        #cta-button {
            display: inline-block;
            padding: 15px 40px;
            background: #00f2fe;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            pointer-events: auto; /* Kích hoạt lại click cho nút */
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
        }

        #cta-button:hover {
            background: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1>Digital Frontier</h1>
        <p>Thành phố linh kiện tương lai. Xây dựng tầm nhìn từ những đường mạch.</p>
        <a href="#" id="cta-button">KHÁM PHÁ CÔNG NGHỆ</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- KHỞI TẠO CƠ BẢN ---
        let scene, camera, renderer, cityGroup, traces;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.15); // Thêm sương mù để tạo chiều sâu

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10); // Góc nhìn từ trên cao xuống
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true }); // Bật khử răng cưa để rõ nét
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); // Tối ưu cho màn hình Retina/High-DPI
            document.body.appendChild(renderer.domElement);

            cityGroup = new THREE.Group();
            scene.add(cityGroup);

            // --- TẠO CÁC ĐƯỜNG MẠCH (TRACES) ---
            // Chúng ta dùng Plane với Texture Grid để mô phỏng
            const floorGeometry = new THREE.PlaneGeometry(100, 100, 100, 100);
            const floorMaterial = new THREE.MeshPhongMaterial({
                color: 0x001122,
                wireframe: true, // Biến thành lưới
                transparent: true,
                opacity: 0.2
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Tạo các đường "mạch điện" neon chạy trên mặt đất
            traces = new THREE.Group();
            scene.add(traces);
            const traceMaterial = new THREE.MeshBasicMaterial({ color: 0x00f2fe });
            for (let i = 0; i < 50; i++) {
                const geometry = new THREE.BoxGeometry(0.02, 0.02, THREE.MathUtils.randFloat(1, 10));
                const trace = new THREE.Mesh(geometry, traceMaterial);
                trace.position.set(
                    THREE.MathUtils.randFloatSpread(20), 
                    0.01, 
                    THREE.MathUtils.randFloatSpread(20)
                );
                traces.add(trace);
            }

            // --- TẠO THÀNH PHỐ LINH KIỆN (BUILDINGS) ---
            // Tạo một vật liệu chung kiểu kim loại đen
            const buildingMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x111111, 
                specular: 0x555555, 
                shininess: 30,
                flatShining: true
            });

            // Hàm tạo một "tòa nhà" linh kiện
            function createBuilding(width, height, depth, x, z, color) {
                const geometry = new THREE.BoxGeometry(width, height, depth);
                const building = new THREE.Mesh(geometry, buildingMaterial);
                building.position.set(x, height / 2, z);
                
                // Thêm viền phát sáng (Glow edge) cho rõ nét
                const edges = new THREE.EdgesGeometry(geometry);
                const lineMat = new THREE.LineBasicMaterial({ color: color });
                const line = new THREE.LineSegments(edges, lineMat);
                building.add(line);

                cityGroup.add(building);
            }

            // Tạo ngẫu nhiên các tòa nhà
            for (let i = 0; i < 40; i++) {
                const h = THREE.MathUtils.randFloat(0.5, 4);
                const w = THREE.MathUtils.randFloat(0.5, 2);
                const d = THREE.MathUtils.randFloat(0.5, 2);
                const x = THREE.MathUtils.randFloatSpread(15);
                const z = THREE.MathUtils.randFloatSpread(15);
                
                // Ngẫu nhiên màu viền (xanh hoặc tím)
                const color = Math.random() > 0.5 ? 0x00f2fe : 0xff00ff;
                
                createBuilding(w, h, d, x, z, color);
            }

            // --- ÁNH SÁNG ---
            const ambientLight = new THREE.AmbientLight(0x222222);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            // Ánh sáng điểm tạo hiệu ứng neon từ dưới lên
            const pointLight = new THREE.PointLight(0x00f2fe, 2, 20);
            pointLight.position.set(0, 1, 0);
            scene.add(pointLight);

            // Xử lý khi resize cửa sổ
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- ANIMATION (BỘ NÃO CỦA BANNER) ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Camera di chuyển chậm xung quanh thành phố
            const timer = Date.now() * 0.0001;
            camera.position.x = Math.sin(timer) * 12;
            camera.position.z = Math.cos(timer) * 12;
            camera.lookAt(0, 1, 0);

            // 2. Làm cho các tòa nhà nhấp nháy nhẹ
            cityGroup.children.forEach((bld, i) => {
                const line = bld.children[0];
                if(line) {
                    line.material.opacity = 0.5 + Math.sin(Date.now() * 0.002 + i) * 0.5;
                }
            });

            // 3. Di chuyển các đường mạch Traces mô phỏng dữ liệu flow
            traces.children.forEach(trace => {
                trace.position.z += 0.05; // Chạy về phía trước
                if (trace.position.z > 10) {
                    trace.position.z = -10; // Reset lại khi đi hết đường
                }
            });

            renderer.render(scene, camera);
        }

        // --- CHẠY ---
        init();
        animate();

    </script>
</body>
</html>
