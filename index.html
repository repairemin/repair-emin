<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>3D Electronic City - Ultra Clarity</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; } /* Nền trời xanh nhạt như ảnh */
        .ui {
            position: absolute; top: 20px; left: 20px;
            color: #fff; font-family: sans-serif;
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="ui">
        <b>ELECTRONIC CITY V1.0</b><br>
        Status: High Visibility Mode
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- KHỞI TẠO ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa3c2d1); // Màu trời nhạt

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- ÁNH SÁNG (Cực kỳ quan trọng để nhìn rõ như ảnh) ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2.5);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- MẶT NỀN PCB (Xanh lá rực rỡ với đường mạch) ---
        const pcbGroup = new THREE.Group();
        const pcbMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.4 });
        const pcbBase = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), pcbMat);
        pcbBase.rotation.x = -Math.PI / 2;
        pcbGroup.add(pcbBase);

        // Vẽ các đường mạch vàng (Traces) rõ ràng
        const traceMat = new THREE.MeshStandardMaterial({ color: 0x88cc44, metalness: 0.5 });
        for(let i=0; i<80; i++) {
            const w = Math.random() > 0.5 ? 0.05 : 0.15;
            const l = Math.random() * 10 + 2;
            const trace = new THREE.Mesh(new THREE.PlaneGeometry(w, l), traceMat);
            trace.rotation.x = -Math.PI / 2;
            trace.position.set((Math.random()-0.5)*50, 0.01, (Math.random()-0.5)*50);
            if(Math.random() > 0.5) trace.rotation.z = Math.PI / 2;
            pcbGroup.add(trace);
        }
        scene.add(pcbGroup);

        // --- HÀM TẠO LINH KIỆN CHI TIẾT ---
        function createCapacitor(x, z) {
            const h = Math.random() * 1.5 + 1;
            const cap = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.5, h, 32),
                new THREE.MeshStandardMaterial({ color: 0x33aaff }) // Xanh tụ điện rực rỡ
            );
            const top = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.5, 0.05, 32),
                new THREE.MeshStandardMaterial({ color: 0xaaaaaa })
            );
            top.position.y = h/2;
            cap.add(body, top);
            cap.position.set(x, h/2, z);
            scene.add(cap);
        }

        function createChip(x, z) {
            const chip = new THREE.Mesh(
                new THREE.BoxGeometry(2, 0.4, 2),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            chip.position.set(x, 0.2, z);
            // Thêm các chân chip bạc
            const pinGeo = new THREE.BoxGeometry(0.1, 0.3, 0.1);
            const pinMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8 });
            for(let i=-0.8; i<=0.8; i+=0.4) {
                const p1 = new THREE.Mesh(pinGeo, pinMat); p1.position.set(1.05, -0.1, i);
                const p2 = new THREE.Mesh(pinGeo, pinMat); p2.position.set(-1.05, -0.1, i);
                chip.add(p1, p2);
            }
            scene.add(chip);
        }

        function createResistor(x, z) {
            const res = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.8, 16), new THREE.MeshStandardMaterial({color: 0xcccccc}));
            body.rotation.z = Math.PI/2;
            // Vạch màu điện trở
            const ring = new THREE.Mesh(new THREE.CylinderGeometry(0.21, 0.21, 0.1, 16), new THREE.MeshStandardMaterial({color: 0xff0000}));
            ring.position.x = 0.2; ring.rotation.z = Math.PI/2;
            body.add(ring);
            res.add(body);
            res.position.set(x, 0.2, z);
            scene.add(res);
        }

        // Tạo cây xanh (Low poly trees) như trong ảnh
        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.5), new THREE.MeshStandardMaterial({color: 0x553311}));
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshStandardMaterial({color: 0x44aa22}));
            leaves.position.y = 0.5;
            tree.add(trunk, leaves);
            tree.position.set(x, 0.25, z);
            scene.add(tree);
        }

        // Rải linh kiện
        for(let i=0; i<150; i++) {
            const x = (Math.random()-0.5)*40;
            const z = (Math.random()-0.5)*40;
            const r = Math.random();
            if(r > 0.7) createCapacitor(x, z);
            else if(r > 0.4) createChip(x, z);
            else if(r > 0.2) createResistor(x, z);
            else createTree(x, z);
        }

        // --- ANIMATION (Góc nhìn thứ nhất bay mượt) ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.003;

            // Camera bay theo đường uốn lượn nhẹ nhàng
            camera.position.x = Math.sin(time) * 15;
            camera.position.z = Math.cos(time * 0.7) * 15;
            camera.position.y = 4 + Math.sin(time * 0.5) * 1.5;

            // Luôn nhìn về phía trước
            const target = new THREE.Vector3(
                Math.sin(time + 0.5) * 10,
                0,
                Math.cos((time + 0.5) * 0.7) * 10
            );
            camera.lookAt(target);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
