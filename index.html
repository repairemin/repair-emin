<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra-Realistic PCB City ⚡</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#050505; overflow:hidden; font-family:'Segoe UI', sans-serif; }
#overlay { position:fixed; inset:0; pointer-events:none; z-index:10; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%); }
#hud { position:absolute; top:30px; left:30px; color:#00ffaa; text-shadow:0 0 10px #00ffaa; font-family:monospace; font-size:12px; line-height:1.6; }
#title { position:absolute; top:30px; right:30px; text-align:right; color:#00ffaa; }
#title h1 { font-size:22px; letter-spacing:8px; font-weight:900; }
#loading { position:fixed; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; color:#00ffaa; transition: 1s; }
.bar { width:200px; height:2px; background:#111; margin-top:10px; position:relative; overflow:hidden; }
.fill { position:absolute; height:100%; background:#00ffaa; width:0%; transition: 0.2s; }
</style>
</head>
<body>

<div id="loading">
  <div style="letter-spacing:10px">INITIALIZING PCB GEN 4</div>
  <div class="bar"><div class="fill" id="lp"></div></div>
</div>

<div id="overlay">
  <div id="hud">
    > SYSTEM: READY<br>
    > VOLTAGE: 12.02V<br>
    > TEMP: 38.6°C<br>
    > SCANNING COMPONENTS...
  </div>
  <div id="title">
    <h1>ADVANCED MOTHERBOARD</h1>
    <p style="font-size:10px;opacity:0.6">MULTI-LAYER ARCHITECTURE | HIGH-DENSITY SMPS</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// --- CONFIG & LOADING ---
const lp = document.getElementById('lp');
let progress = 0;
const loader = setInterval(() => {
  progress += 5; lp.style.width = progress + '%';
  if(progress >= 100) {
    clearInterval(loader);
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').remove(), 1000);
  }
}, 50);

// --- SCENE SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020503);
scene.fog = new THREE.FogExp2(0x020503, 0.006);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ antialias:true, logarithmicDepthBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// --- MATERIALS (REALISTIC) ---
const M = {
  pcb: new THREE.MeshStandardMaterial({ color: 0x0a3312, roughness: 0.4, metalness: 0.2 }),
  copper: new THREE.MeshStandardMaterial({ color: 0xb8860b, metalness: 0.9, roughness: 0.1 }),
  icBody: new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.7 }),
  metal: new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 1, roughness: 0.2 }),
  ceramic: new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 0.4 }),
  solder: new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 }),
  inductor: new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 })
};

// --- COMPONENT BUILDERS ---
const box = (w,h,d,m,x,z,y=0) => {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), m);
  mesh.position.set(x, y + h/2, z);
  mesh.castShadow = mesh.receiveShadow = true;
  return mesh;
};

// Tụ gốm (Cây xanh điện tử) - Nâng cấp thành khối trụ thuôn
function addCeramic(x, z, h=2) {
  const g = new THREE.Group();
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, h, 12), M.ceramic);
  cap.position.set(x, h/2, z);
  const base = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.2, 1.4), M.solder);
  base.position.set(x, 0.1, z);
  g.add(cap, base);
  scene.add(g);
}

// Chip IC chân rết (MCU/Controller)
function addIC(x, z, s, pins=8) {
  const g = new THREE.Group();
  g.add(box(s, 1, s, M.icBody, x, z));
  // Chân rết kim loại
  for(let i=0; i<pins; i++) {
    const pX = x - s/2 - 0.4;
    const pZ = z - s/2 + (i * s/(pins-1));
    g.add(box(0.8, 0.1, 0.3, M.metal, pX, pZ, 0.1));
    g.add(box(0.8, 0.1, 0.3, M.metal, x + s/2 + 0.4, pZ, 0.1));
  }
  scene.add(g);
}

// Tản nhiệt lá (Heatsink)
function addHeatsink(x, z) {
  const base = box(8, 0.5, 6, M.metal, x, z);
  for(let i=0; i<10; i++) {
    scene.add(box(0.1, 4, 6, M.metal, x - 3.5 + i*0.8, z));
  }
  scene.add(base);
}

// Cuộn cảm dán (Power Inductor)
function addInductor(x, z) {
  const body = box(4, 3, 4, M.inductor, x, z);
  const core = box(3.8, 0.1, 3.8, M.metal, x, z, 3);
  scene.add(body, core);
}

// --- PCB CONSTRUCTION (VUÔNG RỘNG) ---
const size = 150;
const board = box(size, 2, size, M.pcb, 0, 0, -2);
scene.add(board);

// Vẽ đường mạch đồng chằng chịt (Copper Traces)
for(let i=0; i<100; i++) {
  const isVert = Math.random() > 0.5;
  const w = isVert ? 0.2 : (20 + Math.random()*80);
  const d = isVert ? (20 + Math.random()*80) : 0.2;
  const trace = box(w, 0.05, d, M.copper, (Math.random()-0.5)*size, (Math.random()-0.5)*size, 0.01);
  scene.add(trace);
}

// PHÂN KHỐI CÔNG NGHỆ CAO
// 1. Khối Nguồn (Power Zone)
for(let i=0; i<4; i++) addInductor(-50, -50 + i*10);
addHeatsink(-35, -50);
for(let i=0; i<30; i++) addCeramic(-65 + Math.random()*25, -65 + Math.random()*30, 1 + Math.random()*3);

// 2. Khối Vi xử lý (Logic Zone) - Trung tâm
addIC(0, 0, 15, 12); // Main MCU
addIC(20, 0, 6, 6);  // Co-Processor
for(let i=0; i<50; i++) {
  const r = 20 + Math.random()*15;
  const a = Math.random() * Math.PI * 2;
  addCeramic(Math.cos(a)*r, Math.sin(a)*r, 0.5 + Math.random()*2);
}

// 3. Khối Giao tiếp & Điều khiển (I/O Zone)
for(let i=0; i<6; i++) addIC(50, -40 + i*15, 5, 4);
addHeatsink(50, 50);
for(let i=0; i<40; i++) addCeramic(40 + Math.random()*25, -60 + Math.random()*100, 1.5);

// --- LIGHTING (CINEMATIC) ---
const amb = new THREE.AmbientLight(0xffffff, 0.2);
scene.add(amb);

const blueLight = new THREE.PointLight(0x0044ff, 2, 150);
blueLight.position.set(-50, 40, -50);
scene.add(blueLight);

const greenLight = new THREE.PointLight(0x00ffaa, 1.5, 150);
greenLight.position.set(50, 30, 50);
scene.add(greenLight);

const mainSun = new THREE.DirectionalLight(0xffffff, 0.5);
mainSun.position.set(20, 100, 20);
mainSun.castShadow = true;
scene.add(mainSun);

// --- ANIMATION & CAMERA (SUPER DRONE VIEW) ---
camera.position.set(100, 80, 100);
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.0012;

  // Drone bay lướt sát mặt linh kiện để thấy độ chi tiết
  camera.position.x = Math.cos(time) * 90;
  camera.position.z = Math.sin(time * 0.7) * 90;
  camera.position.y = 40 + Math.sin(time * 0.5) * 25;
  
  // Điểm nhìn (LookAt) di chuyển theo các khối linh kiện
  const targetX = Math.sin(time * 1.5) * 20;
  const targetZ = Math.cos(time) * 20;
  camera.lookAt(targetX, 0, targetZ);

  // Hiệu ứng "nhịp thở" của mạch điện
  M.ceramic.emissiveIntensity = 0.3 + Math.sin(time * 8) * 0.2;
  
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
