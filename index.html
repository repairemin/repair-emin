<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>3D Electronic City - Logic Traces</title>
    <style>
        body { margin: 0; overflow: hidden; background: #a3c2d1; }
        .hud {
            position: absolute; top: 20px; left: 20px;
            color: #00ff00; font-family: 'Courier New', monospace;
            background: rgba(0, 20, 0, 0.8); padding: 15px; 
            border: 1px solid #00ff00; pointer-events: none;
            box-shadow: 0 0 15px rgba(0,255,0,0.2);
        }
    </style>
</head>
<body>
    <div class="hud">
        <b>[ STATUS: LOGIC ROUTING ACTIVE ]</b><br>
        > MAPPING TRACES TO PINS... DONE<br>
        > SIGNAL INTEGRITY: 100%
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CẤU HÌNH ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x8eb3c5);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- ÁNH SÁNG ---
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- PCB BASE ---
        const pcbBase = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x0a330a, roughness: 0.3 })
        );
        pcbBase.rotation.x = -Math.PI / 2;
        scene.add(pcbBase);

        // --- HÀM VẼ TRACE LOGIC ---
        const traceMat = new THREE.MeshStandardMaterial({ 
            color: 0xd4af37, // Màu vàng Gold
            metalness: 0.8, 
            roughness: 0.2 
        });

        function drawTraceFromPin(startX, startZ) {
            const points = [];
            let currX = startX;
            let currZ = startZ;
            
            points.push(new THREE.Vector3(currX, 0.02, currZ));
            
            // Chạy thẳng ra khỏi linh kiện một chút
            const dir = Math.random() > 0.5 ? 1 : -1;
            if(Math.random() > 0.5) currX += 1 * dir; else currZ += 1 * dir;
            points.push(new THREE.Vector3(currX, 0.02, currZ));

            // Rẽ nhánh 90 độ lần 1
            if(Math.random() > 0.5) currX += Math.random() * 5 * dir; else currZ += Math.random() * 5 * dir;
            points.push(new THREE.Vector3(currX, 0.02, currZ));

            // Vẽ đường mạch bằng Tube hoặc dải phẳng (Plane)
            const path = new THREE.CatmullRomCurve3(points);
            const geometry = new THREE.TubeGeometry(path, 20, 0.03, 8, false);
            const mesh = new THREE.Mesh(geometry, traceMat);
            scene.add(mesh);
        }

        // --- CÁC LINH KIỆN ---

        // 1. Chip IC với chân nối mạch
        function createChip(x, z) {
            const chip = new THREE.Mesh(
                new THREE.BoxGeometry(2.5, 0.4, 2.5),
                new THREE.MeshStandardMaterial({ color: 0x1a1a1a })
            );
            chip.position.set(x, 0.21, z);
            
            for(let i = -1; i <= 1; i += 0.5) {
                // Tọa độ chân trái và phải
                const pins = [
                    { px: x + 1.4, pz: z + i },
                    { px: x - 1.4, pz: z + i }
                ];
                pins.forEach(p => {
                    const pinMesh = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.15), new THREE.MeshStandardMaterial({color:0xcccccc, metalness:1}));
                    pinMesh.position.set(p.px - x, -0.15, p.pz - z);
                    chip.add(pinMesh);
                    // Nối Trace từ chân này
                    drawTraceFromPin(p.px, p.pz);
                });
            }
            scene.add(chip);
        }

        // 2. Transistor TO-92
        function createTransistor(x, z) {
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.3, 0.6, 16, 1, false, 0, Math.PI),
                new THREE.MeshStandardMaterial({ color: 0x000000 })
            );
            body.position.set(x, 0.6, z);
            body.rotation.x = Math.PI;
            
            [-0.2, 0, 0.2].forEach(offset => {
                const pinX = x + offset;
                const pinZ = z;
                // Vẽ trace logic từ 3 chân
                drawTraceFromPin(pinX, pinZ);
                // Vẽ chân cắm xuống
                const pinWire = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.6), new THREE.MeshStandardMaterial({color:0xaaaaaa}));
                pinWire.position.set(pinX, 0.3, pinZ);
                scene.add(pinWire);
            });
            scene.add(body);
        }

        // 3. Tụ hóa (Capacitor)
        function createCap(x, z) {
            const h = 1.8;
            const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, h, 32), new THREE.MeshStandardMaterial({color: 0x0077ff}));
            cap.position.set(x, h/2, z);
            
            // 2 chân tụ
            drawTraceFromPin(x + 0.2, z);
            drawTraceFromPin(x - 0.2, z);
            scene.add(cap);
        }

        // --- RẢI LINH KIỆN ---
        for(let i=0; i<60; i++) {
            const x = (Math.random()-0.5)*40;
            const z = (Math.random()-0.5)*40;
            const r = Math.random();
            if(r > 0.7) createChip(x, z);
            else if(r > 0.4) createTransistor(x, z);
            else createCap(x, z);
        }

        // --- CAMERA FLY ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.002;

            camera.position.x = Math.sin(time) * 20;
            camera.position.z = Math.cos(time * 0.8) * 20;
            camera.position.y = 5 + Math.sin(time * 0.5) * 2;

            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
