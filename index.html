<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Component City V2 - Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000205; font-family: sans-serif; }
        #ui {
            position: absolute; top: 5%; left: 5%; color: #00f2fe;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="margin:0; font-size: 1.5rem;">Hardware City OS</h2>
        <p style="color: #fff; font-size: 0.8rem; opacity: 0.7;">System Status: Online</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, cityGroup, clock;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000205, 0.08);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 10, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            cityGroup = new THREE.Group();
            scene.add(cityGroup);
            clock = new THREE.Clock();

            // --- NỀN MẠCH TRACES ---
            const grid = new THREE.GridHelper(100, 50, 0x004444, 0x002222);
            scene.add(grid);

            // --- HÀM TẠO LINH KIỆN ---

            // 1. CHIP / CPU
            function createCPU(x, z) {
                const group = new THREE.Group();
                // Thân chip
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(2, 0.4, 2),
                    new THREE.MeshPhongMaterial({ color: 0x111111 })
                );
                // Mặt trên (Heat spreader)
                const top = new THREE.Mesh(
                    new THREE.BoxGeometry(1.4, 0.1, 1.4),
                    new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 1, roughness: 0.2 })
                );
                top.position.y = 0.25;
                group.add(body, top);
                
                // Chân chip (Pin)
                const pinGeo = new THREE.BoxGeometry(0.1, 0.2, 0.1);
                const pinMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
                for(let i=-1; i<=1; i+=0.4) {
                    for(let j=-1; j<=1; j+=2) {
                        const p1 = new THREE.Mesh(pinGeo, pinMat);
                        p1.position.set(i, -0.2, j);
                        const p2 = new THREE.Mesh(pinGeo, pinMat);
                        p2.position.set(j, -0.2, i);
                        group.add(p1, p2);
                    }
                }
                group.position.set(x, 0.2, z);
                cityGroup.add(group);
            }

            // 2. TỤ ĐIỆN (Capacitor)
            function createCapacitor(x, z) {
                const group = new THREE.Group();
                const body = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.4, 1.2, 16),
                    new THREE.MeshPhongMaterial({ color: 0x003366 })
                );
                const stripe = new THREE.Mesh(
                    new THREE.BoxGeometry(0.1, 1.21, 0.4),
                    new THREE.MeshBasicMaterial({ color: 0xcccccc })
                );
                stripe.position.x = 0.35;
                group.add(body, stripe);
                group.position.set(x, 0.6, z);
                cityGroup.add(group);
            }

            // 3. ĐIỆN TRỞ (Resistor)
            function createResistor(x, z) {
                const group = new THREE.Group();
                const body = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.2, 0.2, 1, 12),
                    new THREE.MeshPhongMaterial({ color: 0xccaa88 })
                );
                body.rotation.z = Math.PI/2;
                group.add(body);
                // Vòng màu
                [0.2, 0, -0.2].forEach((pos, i) => {
                    const ring = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.21, 0.21, 0.1, 12),
                        new THREE.MeshBasicMaterial({ color: i==0?0xff0000:0x00ff00 })
                    );
                    ring.rotation.z = Math.PI/2;
                    ring.position.x = pos;
                    group.add(ring);
                });
                group.position.set(x, 0.2, z);
                cityGroup.add(group);
            }

            // 4. TRANSISTOR
            function createTransistor(x, z) {
                const group = new THREE.Group();
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(0.6, 0.8, 0.3),
                    new THREE.MeshPhongMaterial({ color: 0x222222 })
                );
                for(let i=-0.2; i<=0.2; i+=0.2) {
                    const leg = new THREE.Mesh(
                        new THREE.BoxGeometry(0.05, 0.5, 0.05),
                        new THREE.MeshBasicMaterial({ color: 0xaaaaaa })
                    );
                    leg.position.set(i, -0.6, 0);
                    group.add(leg);
                }
                group.position.set(x, 0.8, z);
                cityGroup.add(group);
            }

            // --- RẢI LINH KIỆN LÊN BOARD ---
            for (let i = 0; i < 60; i++) {
                const x = THREE.MathUtils.randFloatSpread(40);
                const z = THREE.MathUtils.randFloatSpread(40);
                const type = Math.floor(Math.random() * 4);
                
                if(type === 0) createCPU(x, z);
                else if(type === 1) createCapacitor(x, z);
                else if(type === 2) createResistor(x, z);
                else createTransistor(x, z);
            }

            // Ánh sáng
            const ambient = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            // Camera bay lượn chậm
            camera.position.x = Math.cos(t * 0.1) * 20;
            camera.position.z = Math.sin(t * 0.1) * 20;
            camera.lookAt(0, 0, 0);

            // Hiệu ứng các linh kiện hơi rung động hoặc phát sáng
            cityGroup.children.forEach((obj, i) => {
                obj.position.y += Math.sin(t + i) * 0.002;
            });

            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
