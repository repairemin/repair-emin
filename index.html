<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Eco-Tech City: PCB Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            pointer-events: none;
            text-shadow: 0 0 5px #00ff00;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>ECO-TECH CITY v2.0</h1>
        <p>> INITIALIZING PCB LAYOUT...</p>
        <p>> LOADING COMPONENTS: RESISTORS, VIAS, TEST POINTS...</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- CẤU HÌNH CƠ BẢN ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Bầu trời xanh ban ngày
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(15, 15, 15);
        controls.update();

        // --- ÁNH SÁNG (BAN NGÀY) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        // --- NỀN PCB (BẢNG MẠCH XANH) ---
        const pcbSize = 30;
        const pcbGeometry = new THREE.BoxGeometry(pcbSize, 0.5, pcbSize);
        const pcbMaterial = new THREE.MeshStandardMaterial({ color: 0x004d1a, roughness: 0.3 });
        const pcb = new THREE.Mesh(pcbGeometry, pcbMaterial);
        scene.add(pcb);

        // Vẽ các đường mạch (Traces)
        const grid = new THREE.GridHelper(pcbSize, 30, 0x00ff00, 0x003300);
        grid.position.y = 0.26;
        scene.add(grid);

        // --- HÀM TẠO LINH KIỆN ---

        // 1. Điện trở (Resistors)
        function createResistor(x, z) {
            const group = new THREE.Group();
            // Thân điện trở
            const bodyGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.8, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.z = Math.PI / 2;
            group.add(body);

            // Chân kim loại
            const wireGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.4, 8);
            const wireMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
            const wire = new THREE.Mesh(wireGeo, wireMat);
            wire.rotation.z = Math.PI / 2;
            group.add(wire);

            group.position.set(x, 0.6, z);
            scene.add(group);
        }

        // 2. Via (Lỗ xuyên mạch)
        function createVia(x, z) {
            const viaGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.55, 16);
            const viaMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1 }); // Màu vàng đồng
            const via = new THREE.Mesh(viaGeo, viaMat);
            via.position.set(x, 0.25, z);
            scene.add(via);
        }

        // 3. Test Point (Điểm kiểm tra)
        function createTestPoint(x, z) {
            const tpGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const tpMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 });
            const tp = new THREE.Mesh(tpGeo, tpMat);
            tp.position.set(x, 0.5, z);
            scene.add(tp);
        }

        // 4. Chip IC (Tòa nhà)
        function createChip(x, z, w, d, h) {
            const chipGeo = new THREE.BoxGeometry(w, h, d);
            const chipMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const chip = new THREE.Mesh(chipGeo, chipMat);
            chip.position.set(x, h/2 + 0.25, z);
            scene.add(chip);
        }

        // --- KHỞI TẠO THÀNH PHỐ ---
        for (let i = 0; i < 40; i++) {
            let x = (Math.random() - 0.5) * pcbSize;
            let z = (Math.random() - 0.5) * pcbSize;
            
            const rand = Math.random();
            if (rand > 0.7) createResistor(x, z);
            else if (rand > 0.4) createVia(x, z);
            else if (rand > 0.2) createTestPoint(x, z);
            else createChip(x, z, 1.5, 1.5, Math.random() * 2 + 0.5);
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
