<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware City OS - 3D PCB</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* UI Overlay giống hình mẫu */
        .ui-overlay {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
            color: #00f2ff;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.7);
            pointer-events: none;
        }
        .ui-overlay h1 { margin: 0; font-size: 28px; letter-spacing: 4px; }
        .ui-overlay p { margin: 5px 0; font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <h1>HARDWARE CITY OS</h1>
        <p>SYSTEM STATUS: ONLINE</p>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>

    <script>
        let scene, camera, renderer, pcbGroup;

        function init() {
            scene = new THREE.Scene();
            
            // Camera góc rộng để thấy độ hoành tráng
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 12, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Nhóm chứa toàn bộ linh kiện PCB
            pcbGroup = new THREE.Group();
            scene.add(pcbGroup);

            // 1. Tạo mặt nền PCB lưới (Grid)
            const gridSize = 40;
            const divisions = 40;
            const gridHelper = new THREE.GridHelper(gridSize, divisions, 0x004444, 0x002222);
            pcbGroup.add(gridHelper);

            // 2. Hàm tạo Chip/Linh kiện
            const createComponent = (w, h, d, x, z, color = 0x111111) => {
                const geo = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshPhongMaterial({ color: color });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x, h/2, z);
                pcbGroup.add(mesh);

                // Thêm viền sáng cho chip
                const edges = new THREE.EdgesGeometry(geo);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00f2ff }));
                line.position.copy(mesh.position);
                pcbGroup.add(line);
            };

            // Tạo các Chip ngẫu nhiên trên mặt sàn
            for(let i=0; i<30; i++) {
                const x = (Math.random() - 0.5) * 30;
                const z = (Math.random() - 0.5) * 30;
                const size = Math.random() * 2 + 0.5;
                createComponent(size, Math.random()*0.5 + 0.2, size, x, z);
            }

            // 3. Hiệu ứng đường dẫn mạch (Line Glow)
            for(let i=0; i<20; i++) {
                const points = [];
                let currX = (Math.random()-0.5)*30;
                let currZ = (Math.random()-0.5)*30;
                for(let j=0; j<5; j++) {
                    points.push(new THREE.Vector3(currX, 0.05, currZ));
                    if(Math.random() > 0.5) currX += 2; else currZ += 2;
                }
                const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                const lineMat = new THREE.LineBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.5 });
                const polyline = new THREE.Line(lineGeo, lineMat);
                pcbGroup.add(polyline);
            }

            // 4. Ánh sáng
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x00f2ff, 2, 50);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Quay camera quanh tâm
            const time = Date.now() * 0.0005;
            camera.position.x = Math.sin(time) * 20;
            camera.position.z = Math.cos(time) * 20;
            camera.position.y = 12 + Math.sin(time*0.5) * 2; // Bay lên xuống nhẹ
            
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
