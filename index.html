<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronic City Realistic</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:Consolas,monospace;
}

canvas{
    display:block;
}

#hud{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:10;
}

#title{
    position:absolute;
    top:25px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}

#title h1{
    color:#00ffaa;
    font-size:52px;
    letter-spacing:10px;
    text-shadow:
    0 0 10px #00ffaa,
    0 0 30px #00ffaa;
}

#title p{
    color:#00ffaa66;
    letter-spacing:6px;
    margin-top:5px;
}

#info{
    position:absolute;
    top:20px;
    left:20px;
    color:#00ffaa;
    font-size:13px;
    line-height:1.8;
    background:rgba(0,0,0,.4);
    padding:15px;
    border:1px solid #00ffaa44;
    backdrop-filter:blur(8px);
}

#cross{
    position:absolute;
    left:50%;
    top:50%;
    width:16px;
    height:16px;
    transform:translate(-50%,-50%);
}

#cross::before,
#cross::after{
    content:"";
    position:absolute;
    background:#00ffaa88;
}

#cross::before{
    width:16px;
    height:1px;
    top:7px;
}

#cross::after{
    width:1px;
    height:16px;
    left:7px;
}

#scan{
    position:absolute;
    inset:0;
    background:
    repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.08) 3px
    );
}

#vignette{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle,
    transparent 40%,
    rgba(0,0,0,.8) 100%);
}
</style>
</head>

<body>

<div id="hud">

<div id="scan"></div>
<div id="vignette"></div>

<div id="cross"></div>

<div id="title">
<h1>ELECTRONIC CITY</h1>
<p>REALISTIC PCB WORLD</p>
</div>

<div id="info">
MODE : FIRST PERSON<br>
AREA : PCB CITY<br>
VCC : 5.0V<br>
FPS CAMERA ACTIVE
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

//////////////////////////////////////////////////////////////
// SCENE
//////////////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020805);
scene.fog = new THREE.FogExp2(0x020805,0.015);

//////////////////////////////////////////////////////////////
// CAMERA
//////////////////////////////////////////////////////////////

const camera = new THREE.PerspectiveCamera(
    75,
    innerWidth/innerHeight,
    0.1,
    1000
);

camera.position.set(0,2,-20);

//////////////////////////////////////////////////////////////
// RENDERER
//////////////////////////////////////////////////////////////

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;

document.body.appendChild(renderer.domElement);

//////////////////////////////////////////////////////////////
// LIGHTS
//////////////////////////////////////////////////////////////

scene.add(
    new THREE.AmbientLight(0x224422,.7)
);

const sun = new THREE.DirectionalLight(0xaaffcc,1.2);

sun.position.set(50,80,20);

sun.castShadow=true;

scene.add(sun);

//////////////////////////////////////////////////////////////
// MATERIALS
//////////////////////////////////////////////////////////////

function mat(c,r,m,e,ei){
    return new THREE.MeshStandardMaterial({
        color:c,
        roughness:r ?? .5,
        metalness:m ?? 0,
        emissive:e ?? 0x000000,
        emissiveIntensity:ei ?? 0
    });
}

const M = {

pcb:mat(0x123b1f,.8,.1),

trace:mat(
    0xd9b23d,
    .25,
    .95,
    0x553300,
    .15
),

chip:mat(0x151515,.35,.5),

metal:mat(0xc0c0c0,.15,1),

capBlue:mat(0x1e4b7a,.35,.4),

capBlack:mat(0x111111,.3,.6),

resBody:mat(0xb77a35,.8),

led:mat(
    0x00ff88,
    .1,
    0,
    0x00ff88,
    3
),

sink:mat(0x222222,.45,.9)

};

//////////////////////////////////////////////////////////////
// HELPERS
//////////////////////////////////////////////////////////////

function box(w,h,d,m){
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w,h,d),
        m
    );

    mesh.castShadow=true;
    mesh.receiveShadow=true;

    return mesh;
}

function cyl(rt,rb,h,s,m){

    const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(rt,rb,h,s),
        m
    );

    mesh.castShadow=true;
    mesh.receiveShadow=true;

    return mesh;
}

//////////////////////////////////////////////////////////////
// PCB
//////////////////////////////////////////////////////////////

const pcb = box(240,1,240,M.pcb);

pcb.position.y=-.5;

scene.add(pcb);

//////////////////////////////////////////////////////////////
// TRACES
//////////////////////////////////////////////////////////////

function trace(x1,z1,x2,z2,w=.12){

    const dx=x2-x1;
    const dz=z2-z1;

    const len=Math.sqrt(dx*dx+dz*dz);

    const t = box(
        w*(.9+Math.random()*.3),
        .04,
        len,
        M.trace
    );

    t.position.set(
        (x1+x2)/2 + (Math.random()-.5)*.15,
        .03,
        (z1+z2)/2 + (Math.random()-.5)*.15
    );

    t.rotation.y =
    Math.atan2(dx,dz)
    + (Math.random()-.5)*.05;

    scene.add(t);
}

for(let i=0;i<1000;i++){

    trace(
        (Math.random()-.5)*220,
        (Math.random()-.5)*220,

        (Math.random()-.5)*220,
        (Math.random()-.5)*220,

        .05+Math.random()*.18
    );
}

//////////////////////////////////////////////////////////////
// QFP CHIP
//////////////////////////////////////////////////////////////

function qfp(x,z,size=1){

    const g = new THREE.Group();

    g.position.set(x,0,z);

    const body = box(
        6*size,
        1.2*size,
        6*size,
        M.chip
    );

    body.position.y=.6*size;

    g.add(body);

    // pins
    for(let i=-5;i<=5;i++){

        const p1 = box(.15,.08,.8,M.metal);
        p1.position.set(i*.45,.05,-3.5*size);

        const p2 = p1.clone();
        p2.position.z=3.5*size;

        const p3 = box(.8,.08,.15,M.metal);
        p3.position.set(-3.5*size,.05,i*.45);

        const p4 = p3.clone();
        p4.position.x=3.5*size;

        g.add(p1,p2,p3,p4);
    }

    // leds
    for(let i=0;i<4;i++){

        const led = cyl(
            .12,
            .12,
            .15,
            10,
            M.led
        );

        led.position.set(
            (Math.random()-.5)*3,
            1,
            (Math.random()-.5)*3
        );

        g.add(led);
    }

    scene.add(g);
}

//////////////////////////////////////////////////////////////
// DIP IC
//////////////////////////////////////////////////////////////

function dip(x,z,pins=16){

    const g=new THREE.Group();

    g.position.set(x,0,z);

    const body=box(2,1,pins*.28,M.chip);

    body.position.y=.5;

    g.add(body);

    const perSide=pins/2;

    for(let i=0;i<perSide;i++){

        const zz =
        -pins*.14 + i*.56;

        const p1=box(.1,.08,.5,M.metal);
        p1.position.set(-1.1,.04,zz);

        const p2=box(.1,.08,.5,M.metal);
        p2.position.set(1.1,.04,zz);

        g.add(p1,p2);
    }

    scene.add(g);
}

//////////////////////////////////////////////////////////////
// CAPACITOR
//////////////////////////////////////////////////////////////

function cap(x,z,h=5,r=.8){

    const g=new THREE.Group();

    g.position.set(x,0,z);

    const body=cyl(
        r,
        r,
        h,
        24,
        Math.random()>.5
        ? M.capBlue
        : M.capBlack
    );

    body.position.y=h/2;

    g.add(body);

    const top=cyl(
        r*.95,
        r*.95,
        .12,
        24,
        M.metal
    );

    top.position.y=h+.05;

    g.add(top);

    // vent
    const vent1=box(r*1.2,.04,.08,M.chip);
    vent1.position.set(0,h+.1,0);

    const vent2=box(.08,.04,r*1.2,M.chip);
    vent2.position.set(0,h+.1,0);

    g.add(vent1,vent2);

    scene.add(g);
}

//////////////////////////////////////////////////////////////
// RESISTOR
//////////////////////////////////////////////////////////////

function resistor(x,z){

    const g=new THREE.Group();

    g.position.set(x,0,z);

    g.rotation.y=Math.random()*Math.PI;

    const body=cyl(
        .3,
        .3,
        2.5,
        16,
        M.resBody
    );

    body.rotation.z=Math.PI/2;

    body.position.y=.6;

    g.add(body);

    scene.add(g);
}

//////////////////////////////////////////////////////////////
// TO220
//////////////////////////////////////////////////////////////

function to220(x,z){

    const g=new THREE.Group();

    g.position.set(x,0,z);

    const body=box(2,3,.6,M.chip);

    body.position.y=1.6;

    g.add(body);

    const sink=box(
        4,
        5,
        1.6,
        M.sink
    );

    sink.position.set(0,2.5,1.2);

    g.add(sink);

    for(let i=-3;i<=3;i++){

        const fin=box(
            .12,
            5,
            1.4,
            M.metal
        );

        fin.position.set(
            i*.45,
            2.5,
            1.2
        );

        g.add(fin);
    }

    scene.add(g);
}

//////////////////////////////////////////////////////////////
// BUILD CITY
//////////////////////////////////////////////////////////////

for(let i=0;i<90;i++){

    cap(
        (Math.random()-.5)*180,
        (Math.random()-.5)*180,
        2+Math.random()*8,
        .4+Math.random()*1
    );
}

for(let i=0;i<120;i++){

    resistor(
        (Math.random()-.5)*190,
        (Math.random()-.5)*190
    );
}

for(let i=0;i<80;i++){

    dip(
        (Math.random()-.5)*180,
        (Math.random()-.5)*180,
        [8,14,16][Math.floor(Math.random()*3)]
    );
}

for(let i=0;i<35;i++){

    qfp(
        (Math.random()-.5)*160,
        (Math.random()-.5)*160,
        .7+Math.random()*1.5
    );
}

for(let i=0;i<25;i++){

    to220(
        (Math.random()-.5)*170,
        (Math.random()-.5)*170
    );
}

//////////////////////////////////////////////////////////////
// CAMERA FIRST PERSON FLY
//////////////////////////////////////////////////////////////

let t=0;

function cameraFly(){

    t += .002;

    const radius=85;

    const x =
    Math.cos(t)*radius;

    const z =
    Math.sin(t)*radius;

    const y =
    2.5
    + Math.sin(t*4)*.7;

    camera.position.x=x;
    camera.position.y=y;
    camera.position.z=z;

    const lookX =
    Math.cos(t+.05)*radius;

    const lookZ =
    Math.sin(t+.05)*radius;

    camera.lookAt(
        lookX,
        2,
        lookZ
    );
}

//////////////////////////////////////////////////////////////
// FLOATING LIGHTS
//////////////////////////////////////////////////////////////

for(let i=0;i<80;i++){

    const light=new THREE.PointLight(
        Math.random()>.5
        ? 0x00ffaa
        : 0xffaa00,

        .7,
        10
    );

    light.position.set(
        (Math.random()-.5)*200,
        1+Math.random()*4,
        (Math.random()-.5)*200
    );

    scene.add(light);
}

//////////////////////////////////////////////////////////////
// PARTICLES
//////////////////////////////////////////////////////////////

const pGeo=new THREE.BufferGeometry();

const pCount=2000;

const pPos=new Float32Array(pCount*3);

for(let i=0;i<pCount;i++){

    pPos[i*3]=(Math.random()-.5)*240;
    pPos[i*3+1]=Math.random()*5;
    pPos[i*3+2]=(Math.random()-.5)*240;
}

pGeo.setAttribute(
    'position',
    new THREE.BufferAttribute(pPos,3)
);

const pMat=new THREE.PointsMaterial({
    color:0x00ffaa,
    size:.08,
    transparent:true,
    opacity:.8
});

const points=new THREE.Points(
    pGeo,
    pMat
);

scene.add(points);

//////////////////////////////////////////////////////////////
// ANIMATE
//////////////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(animate);

    cameraFly();

    renderer.render(scene,camera);
}

animate();

//////////////////////////////////////////////////////////////
// RESIZE
//////////////////////////////////////////////////////////////

addEventListener('resize',()=>{

    camera.aspect=
    innerWidth/innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        innerWidth,
        innerHeight
    );
});

</script>
</body>
</html>
