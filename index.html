<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tiến Thắng Center | 3D Component Simulation</title>
    <style>
        body { margin: 0; background: #010a01; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #info { position: absolute; top: 20px; left: 20px; color: #00f2ff; z-index: 100; pointer-events: none; }
        .tech-text { font-family: monospace; font-size: 12px; line-height: 1.5; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="info">
        <h1 style="margin:0; letter-spacing: 5px;">TIẾN THẮNG CENTER</h1>
        <div class="tech-text">
            > COMPONENT RENDERING: ACTIVE<br>
            > MODEL: MCU_SMD_PITCH_0.5mm<br>
            > STATUS: CALIBRATING...
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, group;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(30, 20, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            group = new THREE.Group();
            scene.add(group);

            // 1. VẼ PCB (MÀU XANH ĐẬM ĐẶC TRƯNG)
            const pcbGeo = new THREE.BoxGeometry(40, 0.8, 40);
            const pcbMat = new THREE.MeshPhongMaterial({ color: 0x052f05, shininess: 30 });
            const pcb = new THREE.Mesh(pcbGeo, pcbMat);
            group.add(pcb);

            // 2. VẼ CHIP MCU (VỚI 40 CHÂN ĐỒNG XUNG QUANH)
            const chipGeo = new THREE.BoxGeometry(10, 1.2, 10);
            const chipMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            const chip = new THREE.Mesh(chipGeo, chipMat);
            chip.position.y = 1;
            group.add(chip);

            // Vẽ chân Chip (Pins)
            const pinGeo = new THREE.BoxGeometry(0.3, 0.1, 1.5);
            const pinMat = new THREE.MeshPhongMaterial({ color: 0xcccccc, specular: 0xffffff });
            for(let i = -4; i <= 4; i++) {
                // Chân hai bên cạnh dọc
                const pinL = new THREE.Mesh(pinGeo, pinMat);
                pinL.position.set(-5.5, 0.6, i);
                group.add(pinL);
                const pinR = new THREE.Mesh(pinGeo, pinMat);
                pinR.position.set(5.5, 0.6, i);
                group.add(pinR);
                // Chân hai bên cạnh ngang
                const pinT = new THREE.Mesh(pinGeo, pinMat);
                pinT.rotation.y = Math.PI / 2;
                pinT.position.set(i, 0.6, -5.5);
                group.add(pinT);
                const pinB = new THREE.Mesh(pinGeo, pinMat);
                pinB.rotation.y = Math.PI / 2;
                pinB.position.set(i, 0.6, 5.5);
                group.add(pinB);
            }

            // 3. VẼ TỤ ĐIỆN HÌNH TRỤ (ELECTROLYTIC CAPACITOR)
            const capGeo = new THREE.CylinderGeometry(1.5, 1.5, 4, 32);
            const capMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const cap = new THREE.Mesh(capGeo, capMat);
            cap.position.set(-12, 2.4, -12);
            group.add(cap);
            // Vạch trắng âm trên tụ
            const stripeGeo = new THREE.PlaneGeometry(0.5, 4);
            const stripeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const stripe = new THREE.Mesh(stripeGeo, stripeMat);
            stripe.position.set(-10.4, 2.4, -12);
            stripe.rotation.y = Math.PI / 2;
            group.add(stripe);

            // 4. VẼ ĐƯỜNG MẠCH (COPPER TRACES)
            for(let j = 0; j < 15; j++) {
                const traceGeo = new THREE.BoxGeometry(0.2, 0.01, 15);
                const traceMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.4 });
                const trace = new THREE.Mesh(traceGeo, traceMat);
                trace.position.set((Math.random()-0.5)*30, 0.41, (Math.random()-0.5)*30);
                group.add(trace);
            }

            // Ánh sáng để thấy rõ khối
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x444444));
        }

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
