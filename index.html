<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronic City ⚡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050e06;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    cursor: crosshair;
  }

  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }

  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  #title {
    position: absolute;
    top: 24px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }

  #title h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(18px, 3vw, 32px);
    color: #00ff88;
    text-shadow: 0 0 20px #00ff8888, 0 0 60px #00ff8833;
    letter-spacing: 4px;
    animation: titlePulse 3s ease-in-out infinite;
  }

  #title p {
    font-size: 11px;
    color: #00ff8866;
    letter-spacing: 6px;
    margin-top: 4px;
    text-transform: uppercase;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 20px #00ff8888, 0 0 60px #00ff8833; }
    50% { text-shadow: 0 0 30px #00ff88cc, 0 0 80px #00ff8866, 0 0 120px #00ff8822; }
  }

  #legend {
    position: absolute;
    bottom: 24px; right: 24px;
    background: rgba(0,20,8,0.85);
    border: 1px solid #00ff8833;
    border-radius: 8px;
    padding: 16px 20px;
    backdrop-filter: blur(8px);
  }

  #legend h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: #00ff88;
    letter-spacing: 3px;
    margin-bottom: 12px;
    border-bottom: 1px solid #00ff8822;
    padding-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 11px;
    color: #88ccaa;
  }

  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  #stats {
    position: absolute;
    bottom: 24px; left: 24px;
    font-size: 11px;
    color: #00ff8855;
    line-height: 1.8;
  }

  #scanline {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }

  #vignette {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="city"></canvas>

<div id="ui">
  <div id="scanline"></div>
  <div id="vignette"></div>

  <div id="title">
    <h1>⚡ ELECTRONIC CITY</h1>
    <p>Isometric PCB Metropolis</p>
  </div>

  <div id="legend">
    <h3>// LEGEND</h3>
    <div class="legend-item"><div class="legend-dot" style="background:#c0c0ff;box-shadow:0 0 6px #8888ff"></div> IC CHIP — Stadium</div>
    <div class="legend-item"><div class="legend-dot" style="background:#aaddff;box-shadow:0 0 6px #44aaff"></div> Capacitor — Skyscraper</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffcc44;box-shadow:0 0 6px #ffaa00"></div> Resistor — Building</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff6644;box-shadow:0 0 6px #ff4400"></div> Diode — Shop</div>
    <div class="legend-item"><div class="legend-dot" style="background:#cc88ff;box-shadow:0 0 6px #aa44ff"></div> Transistor — Factory</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffeeaa;box-shadow:0 0 6px #ffcc44"></div> Transformer — Power Station</div>
    <div class="legend-item"><div class="legend-dot" style="background:#44ff88;box-shadow:0 0 6px #00ff44"></div> Ceramic Cap — Tree</div>
  </div>

  <div id="stats">
    <div>VOLTAGE : 5.0V DC</div>
    <div>CURRENT : <span id="stat-current">0.00</span>A</div>
    <div>FREQ    : 1.0 MHz</div>
    <div>TEMP    : <span id="stat-temp">25</span>°C</div>
    <div>UPTIME  : <span id="stat-uptime">00:00:00</span></div>
  </div>
</div>

<script>
const canvas = document.getElementById('city');
const ctx = canvas.getContext('2d');
let W, H, CX, CY;
let t = 0;
let startTime = Date.now();

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2;
  CY = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ─── ISO HELPERS ─────────────────────────────────────────────
const ISO_ANGLE = Math.PI / 6;
const TILE = 52;

function isoToScreen(gx, gy, gz = 0) {
  const sx = CX + (gx - gy) * TILE * Math.cos(ISO_ANGLE);
  const sy = CY + (gx + gy) * TILE * Math.sin(ISO_ANGLE) - gz * TILE * 0.9;
  return { x: sx, y: sy };
}

// ─── COLOR HELPERS ────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

function darken(hex, factor) {
  const { r, g, b } = hexToRgb(hex);
  return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
}

function glowColor(hex, alpha) {
  const { r, g, b } = hexToRgb(hex);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ─── DRAW ISO BLOCK ────────────────────────────────────────────
function drawIsoBox(gx, gy, gz, gw, gd, gh, topColor, sideColor, rimColor) {
  // corners
  const tl = isoToScreen(gx,      gy,      gz + gh);
  const tr = isoToScreen(gx + gw, gy,      gz + gh);
  const br = isoToScreen(gx + gw, gy + gd, gz + gh);
  const bl = isoToScreen(gx,      gy + gd, gz + gh);

  const ml = isoToScreen(gx,      gy + gd, gz);
  const mr = isoToScreen(gx + gw, gy + gd, gz);
  const fl = isoToScreen(gx,      gy,      gz);
  const fr = isoToScreen(gx + gw, gy,      gz);

  // left face
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y);
  ctx.lineTo(bl.x, bl.y);
  ctx.lineTo(ml.x, ml.y);
  ctx.lineTo(fl.x, fl.y);
  ctx.closePath();
  ctx.fillStyle = darken(sideColor, 0.55);
  ctx.fill();

  // right face
  ctx.beginPath();
  ctx.moveTo(tr.x, tr.y);
  ctx.lineTo(br.x, br.y);
  ctx.lineTo(mr.x, mr.y);
  ctx.lineTo(fr.x, fr.y);
  ctx.closePath();
  ctx.fillStyle = darken(sideColor, 0.75);
  ctx.fill();

  // top face
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y);
  ctx.lineTo(tr.x, tr.y);
  ctx.lineTo(br.x, br.y);
  ctx.lineTo(bl.x, bl.y);
  ctx.closePath();
  ctx.fillStyle = topColor;
  ctx.fill();

  // rim
  ctx.strokeStyle = rimColor || '#00ff8844';
  ctx.lineWidth = 0.8;
  ctx.stroke();
}

// ─── PCB GROUND ────────────────────────────────────────────────
function drawGround() {
  const size = 16;
  for (let x = -size; x < size; x++) {
    for (let y = -size; y < size; y++) {
      const p1 = isoToScreen(x,   y);
      const p2 = isoToScreen(x+1, y);
      const p3 = isoToScreen(x+1, y+1);
      const p4 = isoToScreen(x,   y+1);

      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.lineTo(p3.x, p3.y);
      ctx.lineTo(p4.x, p4.y);
      ctx.closePath();

      const dist = Math.sqrt(x*x + y*y);
      const alpha = Math.max(0, 0.6 - dist * 0.04);
      ctx.fillStyle = `rgba(0, 30, 12, ${alpha})`;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0, 80, 30, 0.25)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
}

// ─── PCB TRACES ────────────────────────────────────────────────
const traces = [
  // horizontal traces
  { x1: -7, y1: 0, x2: 7, y2: 0 },
  { x1: -7, y1: 3, x2: 7, y2: 3 },
  { x1: -7, y1: -3, x2: 7, y2: -3 },
  // vertical traces
  { x1: 0, y1: -7, x2: 0, y2: 7 },
  { x1: 3, y1: -7, x2: 3, y2: 7 },
  { x1: -3, y1: -7, x2: -3, y2: 7 },
  // diagonal connector
  { x1: -5, y1: -5, x2: -3, y2: -3 },
  { x1: 5,  y1: -5, x2: 3,  y2: -3 },
  { x1: -5, y1: 5,  x2: -3, y2: 3  },
  { x1: 5,  y1: 5,  x2: 3,  y2: 3  },
];

function drawTraces() {
  traces.forEach(tr => {
    const p1 = isoToScreen(tr.x1, tr.y1, 0.02);
    const p2 = isoToScreen(tr.x2, tr.y2, 0.02);
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = '#c8a020';
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.55;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // glow
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = '#ffcc0033';
    ctx.lineWidth = 7;
    ctx.stroke();
  });
}

// ─── PARTICLES ─────────────────────────────────────────────────
const particles = [];

function spawnParticle() {
  const tr = traces[Math.floor(Math.random() * traces.length)];
  const forward = Math.random() > 0.5;
  particles.push({
    tr,
    progress: forward ? 0 : 1,
    speed: (0.003 + Math.random() * 0.006) * (forward ? 1 : -1),
    color: Math.random() > 0.5 ? '#00ff88' : '#ffcc00',
    size: 2 + Math.random() * 2,
    life: 1
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.progress += p.speed;
    if (p.progress < 0 || p.progress > 1) {
      particles.splice(i, 1);
      continue;
    }
    const x = p.tr.x1 + (p.tr.x2 - p.tr.x1) * p.progress;
    const y = p.tr.y1 + (p.tr.y2 - p.tr.y1) * p.progress;
    const sc = isoToScreen(x, y, 0.08);

    ctx.beginPath();
    ctx.arc(sc.x, sc.y, p.size, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 12;
    ctx.shadowColor = p.color;
    ctx.fill();
    ctx.shadowBlur = 0;

    // trail
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, p.size * 3, 0, Math.PI*2);
    ctx.fillStyle = p.color + '22';
    ctx.fill();
  }
}

// ─── CHIP (STADIUM CENTER) ─────────────────────────────────────
function drawChip(gx, gy) {
  const pulse = 0.5 + 0.5 * Math.sin(t * 0.04);
  const h = 1.2;

  // base
  drawIsoBox(gx, gy, 0, 4, 4, h, '#9090cc', '#7070aa', '#c0c0ff88');

  // top details — chip lines
  const top_tl = isoToScreen(gx,   gy,   h);
  const top_tr = isoToScreen(gx+4, gy,   h);
  const top_br = isoToScreen(gx+4, gy+4, h);
  const top_bl = isoToScreen(gx,   gy+4, h);

  // inner square
  const i1 = isoToScreen(gx+0.5, gy+0.5, h+0.01);
  const i2 = isoToScreen(gx+3.5, gy+0.5, h+0.01);
  const i3 = isoToScreen(gx+3.5, gy+3.5, h+0.01);
  const i4 = isoToScreen(gx+0.5, gy+3.5, h+0.01);
  ctx.beginPath();
  ctx.moveTo(i1.x,i1.y); ctx.lineTo(i2.x,i2.y);
  ctx.lineTo(i3.x,i3.y); ctx.lineTo(i4.x,i4.y);
  ctx.closePath();
  ctx.fillStyle = `rgba(40,40,100,${0.7 + pulse*0.3})`;
  ctx.fill();
  ctx.strokeStyle = `rgba(180,180,255,${0.4 + pulse*0.4})`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // chip pins on sides
  for (let i = 1; i <= 3; i++) {
    const ratio = i / 4;
    // left side pins
    const pa = isoToScreen(gx + ratio*4, gy - 0.3, h*0.5);
    const pb = isoToScreen(gx + ratio*4, gy,       h*0.5);
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y);
    ctx.strokeStyle = '#c0c0ff'; ctx.lineWidth = 2; ctx.stroke();
    // right side pins
    const pc = isoToScreen(gx + ratio*4, gy+4,     h*0.5);
    const pd = isoToScreen(gx + ratio*4, gy+4.3,   h*0.5);
    ctx.beginPath(); ctx.moveTo(pc.x,pc.y); ctx.lineTo(pd.x,pd.y); ctx.stroke();
  }

  // glow
  const center = isoToScreen(gx+2, gy+2, h);
  const grad = ctx.createRadialGradient(center.x, center.y, 5, center.x, center.y, 80);
  grad.addColorStop(0, `rgba(150,150,255,${0.15 + pulse*0.15})`);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(center.x-100, center.y-60, 200, 120);
}

// ─── CAPACITOR (SKYSCRAPER) ────────────────────────────────────
function drawCapacitor(gx, gy, height, color) {
  const pulse = 0.5 + 0.5 * Math.sin(t * 0.05 + gx * 0.7 + gy * 0.5);
  const w = 1, d = 1;

  // body cylinder-ish (using stacked boxes)
  for (let z = 0; z < height; z++) {
    const ratio = z / height;
    const shade = `rgba(${Math.floor(100+ratio*80)},${Math.floor(160+ratio*80)},${Math.floor(200+ratio*55)},1)`;
    drawIsoBox(gx, gy, z*0.8, w, d, 0.78, shade, '#5599aa', '#aaddff44');
  }

  // top cap
  drawIsoBox(gx-0.05, gy-0.05, height*0.8, w+0.1, d+0.1, 0.15, '#ddeeff', '#aaccdd', '#ffffff88');

  // stripe
  drawIsoBox(gx, gy, height*0.8*0.4, w, d, 0.08, '#ffffff', '#cccccc', 'transparent');

  // top LED glow
  const top = isoToScreen(gx+0.5, gy+0.5, height*0.8+0.2);
  ctx.beginPath();
  ctx.arc(top.x, top.y, 3+pulse*2, 0, Math.PI*2);
  ctx.fillStyle = `rgba(180,230,255,${0.5+pulse*0.5})`;
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#aaddff';
  ctx.fill();
  ctx.shadowBlur = 0;
}

// ─── RESISTOR (BUILDING) ───────────────────────────────────────
const BAND_COLORS = ['#ff4444','#ffaa00','#ffff44','#44ff44','#4444ff','#aa44ff'];

function drawResistor(gx, gy, height, bands) {
  const w = 1.2, d = 0.8;
  drawIsoBox(gx, gy, 0, w, d, height, '#cc9944', '#aa7722', '#ffcc4444');

  // color bands
  bands.forEach((col, i) => {
    const z = height * (0.2 + i * 0.2);
    drawIsoBox(gx, gy, z, w, d, 0.1, col, darken(col, 0.6), 'transparent');
  });

  // end caps
  drawIsoBox(gx-0.05, gy-0.05, 0,      w+0.1, d+0.1, 0.1, '#ddbbaa', '#bbaa88', 'transparent');
  drawIsoBox(gx-0.05, gy-0.05, height-0.05, w+0.1, d+0.1, 0.1, '#ddbbaa', '#bbaa88', 'transparent');
}

// ─── DIODE (SHOP) ──────────────────────────────────────────────
function drawDiode(gx, gy) {
  const pulse = 0.5 + 0.5 * Math.sin(t * 0.08 + gx);
  drawIsoBox(gx, gy, 0, 1.5, 0.8, 0.7, '#cc4422', '#882211', '#ff664444');

  // stripe (cathode band)
  drawIsoBox(gx + 1.1, gy, 0, 0.2, 0.8, 0.7, '#dddddd', '#999999', 'transparent');

  // glow
  const center = isoToScreen(gx+0.75, gy+0.4, 0.7);
  ctx.beginPath();
  ctx.arc(center.x, center.y, 4+pulse*3, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,100,50,${0.3+pulse*0.3})`;
  ctx.shadowBlur = 10; ctx.shadowColor = '#ff4400';
  ctx.fill(); ctx.shadowBlur = 0;
}

// ─── TRANSISTOR (FACTORY) ─────────────────────────────────────
function drawTransistor(gx, gy) {
  // main body
  drawIsoBox(gx, gy, 0, 1.2, 1.2, 1.5, '#aa66ff', '#7733cc', '#cc88ff44');

  // 3 legs (base, collector, emitter)
  const legH = 0.4;
  [0.1, 0.5, 0.9].forEach((offset, i) => {
    const lx = gx + offset * 1.2;
    const s = isoToScreen(lx, gy + 1.2, 0);
    const e = isoToScreen(lx, gy + 1.5, 0);
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y);
    ctx.strokeStyle = '#888888'; ctx.lineWidth = 3; ctx.stroke();
  });

  // flat base
  drawIsoBox(gx - 0.1, gy - 0.1, 0, 1.4, 1.4, 0.15, '#ccaaff', '#9966dd', 'transparent');
}

// ─── TRANSFORMER (POWER STATION) ──────────────────────────────
function drawTransformer(gx, gy) {
  const pulse = 0.5 + 0.5 * Math.sin(t * 0.06 + gy);
  // base platform
  drawIsoBox(gx, gy, 0, 2.5, 2, 0.2, '#444444', '#333333', '#88888844');

  // primary coil (left cylinder)
  for (let z = 0; z < 5; z++) {
    const col = z % 2 === 0 ? '#886622' : '#aa8833';
    drawIsoBox(gx+0.2, gy+0.4, 0.2+z*0.3, 0.8, 0.8, 0.28, col, darken(col,0.6), 'transparent');
  }
  // secondary coil (right cylinder)
  for (let z = 0; z < 5; z++) {
    const col = z % 2 === 0 ? '#664488' : '#8855aa';
    drawIsoBox(gx+1.3, gy+0.4, 0.2+z*0.3, 0.8, 0.8, 0.28, col, darken(col,0.6), 'transparent');
  }

  // core between
  drawIsoBox(gx+0.9, gy+0.4, 0.2, 0.5, 0.8, 1.5, '#555555', '#444444', '#aaaaaa22');

  // electric arc glow
  const arcPos = isoToScreen(gx+1.25, gy+1, 1.8);
  ctx.beginPath();
  ctx.arc(arcPos.x, arcPos.y, 6+pulse*5, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,220,100,${0.2+pulse*0.4})`;
  ctx.shadowBlur = 20; ctx.shadowColor = '#ffcc44';
  ctx.fill(); ctx.shadowBlur = 0;
}

// ─── CERAMIC CAP (TREE) ────────────────────────────────────────
function drawCeramicTree(gx, gy, size) {
  const sway = Math.sin(t * 0.03 + gx * 1.2) * 0.05;

  // stem
  const sb = isoToScreen(gx+0.5, gy+0.5, 0);
  const st = isoToScreen(gx+0.5+sway, gy+0.5, size*0.4);
  ctx.beginPath(); ctx.moveTo(sb.x, sb.y); ctx.lineTo(st.x, st.y);
  ctx.strokeStyle = '#558844'; ctx.lineWidth = 4; ctx.stroke();

  // ceramic disc (flat round cap)
  const topCenter = isoToScreen(gx+0.5+sway, gy+0.5, size*0.4);
  const r = size * 12;

  // disc body
  ctx.beginPath();
  ctx.ellipse(topCenter.x, topCenter.y, r, r*0.5, 0, 0, Math.PI*2);
  ctx.fillStyle = '#33bb55';
  ctx.shadowBlur = 8; ctx.shadowColor = '#00ff44';
  ctx.fill(); ctx.shadowBlur = 0;
  ctx.strokeStyle = '#55dd77';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // highlight
  ctx.beginPath();
  ctx.ellipse(topCenter.x - r*0.2, topCenter.y - r*0.15, r*0.4, r*0.2, -0.3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(150,255,180,0.35)';
  ctx.fill();

  // small LED dots on tree
  for (let i = 0; i < 3; i++) {
    const angle = t * 0.02 + i * (Math.PI * 2 / 3);
    const lx = topCenter.x + Math.cos(angle) * r * 0.6;
    const ly = topCenter.y + Math.sin(angle) * r * 0.3;
    ctx.beginPath();
    ctx.arc(lx, ly, 2, 0, Math.PI*2);
    const ledColors = ['#ff4444','#44ff44','#4488ff'];
    ctx.fillStyle = ledColors[i];
    ctx.shadowBlur = 6; ctx.shadowColor = ledColors[i];
    ctx.fill(); ctx.shadowBlur = 0;
  }
}

// ─── SOLDER JOINT ─────────────────────────────────────────────
function drawVia(gx, gy) {
  const pos = isoToScreen(gx, gy, 0.05);
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 5, 0, Math.PI*2);
  ctx.fillStyle = '#c8a020';
  ctx.strokeStyle = '#ffcc4488';
  ctx.lineWidth = 2;
  ctx.fill(); ctx.stroke();

  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 2.5, 0, Math.PI*2);
  ctx.fillStyle = '#332200';
  ctx.fill();
}

// ─── CITY LAYOUT ──────────────────────────────────────────────
function drawCity() {
  // PCB Ground
  drawGround();

  // Traces
  drawTraces();

  // Vias / solder joints
  const viaPoints = [
    [-3,0],[3,0],[0,-3],[0,3],
    [-3,3],[3,3],[-3,-3],[3,-3],
    [0,0.5],[0,-0.5],
  ];
  viaPoints.forEach(([x,y]) => drawVia(x-0.5, y-0.5));

  // === TREES (Ceramic Caps) scattered around ===
  const trees = [
    [-8, -2, 0.9], [-7,  2, 1.1], [-8,  5, 0.8],
    [ 7, -3, 1.0], [ 8,  1, 0.9], [ 6,  6, 1.2],
    [-1, -8, 0.85],[ 2, -7, 1.0], [-4, -7, 0.9],
    [ 0,  8, 1.1], [-3,  7, 0.9], [ 4,  7, 1.0],
    [-6, -6, 0.8], [ 5, -6, 0.9],
    [-9, -5, 0.7], [ 9, -4, 0.75],
  ];
  trees.forEach(([x,y,s]) => drawCeramicTree(x, y, s));

  // === RESISTORS — outer ring buildings ===
  const resistors = [
    { x: -7, y: -1, h: 1.2, bands: [BAND_COLORS[0], BAND_COLORS[2], BAND_COLORS[4]] },
    { x: -7, y:  3, h: 0.9, bands: [BAND_COLORS[1], BAND_COLORS[3], BAND_COLORS[0]] },
    { x:  5, y: -2, h: 1.3, bands: [BAND_COLORS[2], BAND_COLORS[5], BAND_COLORS[1]] },
    { x:  5, y:  4, h: 1.0, bands: [BAND_COLORS[4], BAND_COLORS[0], BAND_COLORS[3]] },
    { x: -2, y: -6, h: 1.1, bands: [BAND_COLORS[3], BAND_COLORS[1], BAND_COLORS[5]] },
    { x:  2, y: -6, h: 0.8, bands: [BAND_COLORS[5], BAND_COLORS[2], BAND_COLORS[0]] },
    { x: -2, y:  6, h: 1.2, bands: [BAND_COLORS[0], BAND_COLORS[4], BAND_COLORS[2]] },
    { x:  2, y:  6, h: 0.95, bands: [BAND_COLORS[1], BAND_COLORS[3], BAND_COLORS[4]] },
  ];
  resistors.forEach(r => drawResistor(r.x, r.y, r.h, r.bands));

  // === DIODES — commercial strip ===
  const diodes = [
    [-6, 0], [-6, 2], [-6, 4],
    [ 4, 0], [ 4, 2], [ 4, 4],
  ];
  diodes.forEach(([x,y]) => drawDiode(x, y));

  // === TRANSISTORS — factory district ===
  drawTransistor(-5, -4);
  drawTransistor(-5, -2);
  drawTransistor( 4, -5);
  drawTransistor( 3, -4);

  // === TRANSFORMERS — power stations ===
  drawTransformer(-7, -5);
  drawTransformer( 5, -6);
  drawTransformer(-7,  6);
  drawTransformer( 5,  5);

  // === CAPACITORS — skyscrapers ===
  const caps = [
    { x: -4, y: -1, h: 4 }, { x: -4, y:  1, h: 5 },
    { x:  3, y: -1, h: 4 }, { x:  3, y:  1, h: 5 },
    { x: -4, y:  3, h: 3 }, { x:  3, y:  3, h: 3 },
    { x: -1, y: -4, h: 4 }, { x:  1, y: -4, h: 3 },
    { x: -1, y:  4, h: 4 }, { x:  1, y:  4, h: 3 },
  ];
  caps.forEach(c => drawCapacitor(c.x, c.y, c.h));

  // === CHIP CENTER ===
  drawChip(-2, -2);
}

// ─── PARTICLES LOOP ───────────────────────────────────────────
let particleTimer = 0;

// ─── STATS UPDATE ─────────────────────────────────────────────
function updateStats() {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const hh = String(Math.floor(elapsed / 3600)).padStart(2,'0');
  const mm = String(Math.floor((elapsed % 3600) / 60)).padStart(2,'0');
  const ss = String(elapsed % 60).padStart(2,'0');
  document.getElementById('stat-uptime').textContent = `${hh}:${mm}:${ss}`;
  document.getElementById('stat-current').textContent = (0.48 + 0.04 * Math.sin(t * 0.05)).toFixed(2);
  document.getElementById('stat-temp').textContent = Math.floor(24 + 2 * Math.sin(t * 0.02));
}

// ─── BACKGROUND ───────────────────────────────────────────────
function drawBackground() {
  const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * 0.7);
  grad.addColorStop(0, '#071a0d');
  grad.addColorStop(1, '#020805');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // stars / noise
  if (!drawBackground._stars) {
    drawBackground._stars = Array.from({length: 120}, () => ({
      x: Math.random() * 2000 - 1000,
      y: Math.random() * 1200 - 600,
      r: Math.random() * 1.2,
      a: Math.random()
    }));
  }
  drawBackground._stars.forEach(s => {
    const sx = CX + s.x * (W/2000);
    const sy = CY + s.y * (H/1200);
    if (sx < 0 || sx > W || sy < 0 || sy > H) return;
    ctx.beginPath();
    ctx.arc(sx, sy, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,255,80,${s.a * 0.3})`;
    ctx.fill();
  });
}

// ─── MAIN LOOP ────────────────────────────────────────────────
function loop() {
  t++;

  drawBackground();
  drawCity();

  // spawn particles
  particleTimer++;
  if (particleTimer % 4 === 0 && particles.length < 60) spawnParticle();
  updateParticles();

  // update stats every 20 frames
  if (t % 20 === 0) updateStats();

  requestAnimationFrame(loop);
}

loop();
</script>
