<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC-DC Power Supply 3D ⚡</title>
<style>
/* Giữ nguyên CSS cũ của bạn */
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas { display:block; }
#overlay { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:10; }
#title { position:absolute; top:28px; left:50%; transform:translateX(-50%); text-align:center; }
#title h1 { font-size:clamp(16px,2.5vw,28px); font-weight:900; letter-spacing:6px; color:#00ffaa; text-shadow:0 0 20px #00ffaa; animation:glow 2.5s ease-in-out infinite; }
#title p { font-size:10px; color:#00ffaa55; letter-spacing:8px; margin-top:5px; }
@keyframes glow { 0%,100% { text-shadow:0 0 20px #00ffaa; } 50% { text-shadow:0 0 40px #00ffaa; } }
#legend { position:absolute; bottom:24px; right:20px; background:rgba(0,15,8,0.88); border:1px solid #00ffaa22; border-radius:6px; padding:14px 18px; backdrop-filter:blur(10px); }
#legend h3 { font-size:9px; color:#00ffaa; letter-spacing:4px; margin-bottom:10px; border-bottom:1px solid #00ffaa22; padding-bottom:6px; }
.li { display:flex; align-items:center; gap:9px; margin-bottom:7px; font-size:10px; color:#88bbaa; }
.ld { width:10px; height:10px; border-radius:2px; }
#stats { position:absolute; bottom:24px; left:20px; font-size:10px; color:#00ffaa44; line-height:2; }
#loading { position:fixed; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; transition:opacity 1s ease; }
#loading h2 { color:#00ffaa; font-size:18px; letter-spacing:6px; }
#loading-bar { width:300px; height:2px; background:#00ffaa22; margin-top:20px; }
#loading-fill { height:100%; background:#00ffaa; width:0%; transition:width 0.3s; }
</style>
</head>
<body>

<div id="loading">
  <h2>SYSTEM BOOTING...</h2>
  <div id="loading-bar"><div id="loading-fill"></div></div>
</div>

<div id="overlay">
  <div id="title">
    <h1>SMPS POWER SUPPLY</h1>
    <p>AC 220V ➔ DC 12V MODULE</p>
  </div>
  <div id="legend">
    <h3>// TOPOLOGY</h3>
    <div class="li"><div class="ld" style="background:#ffcc44"></div>EMI Filter / Fuse</div>
    <div class="li"><div class="ld" style="background:#1a4466"></div>High-Voltage Cap</div>
    <div class="li"><div class="ld" style="background:#222"></div>Flyback Transformer</div>
    <div class="li"><div class="ld" style="background:#33aa55"></div>Output Filter</div>
  </div>
  <div id="stats">
    VIN  : 220V AC<br>
    VOUT : 12.0V DC<br>
    EFF  : 88.5%<br>
    TEMP : <span id="st">25</span>°C<br>
    UP   : <span id="su">00:00:00</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// --- INITIAL LOADING ---
const loadFill = document.getElementById('loading-fill');
const loadDiv  = document.getElementById('loading');
let loadPct = 0;
const loadInterval = setInterval(() => {
  loadPct = Math.min(loadPct + 10, 100);
  loadFill.style.width = loadPct+'%';
  if(loadPct >= 100) {
    clearInterval(loadInterval);
    setTimeout(() => { loadDiv.style.opacity='0'; setTimeout(()=>loadDiv.remove(),1000); animate(); }, 500);
  }
}, 100);

// --- RENDERER SETUP ---
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020804);
scene.fog = new THREE.FogExp2(0x020804, 0.012);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(60, 40, 60);

// --- MATERIALS ---
const M = {
  pcb:      new THREE.MeshStandardMaterial({ color:0x0a3d12, roughness:0.8 }),
  copper:   new THREE.MeshStandardMaterial({ color:0xb8860b, metalness:0.9, roughness:0.1 }),
  plastic:  new THREE.MeshStandardMaterial({ color:0x111111, roughness:0.5 }),
  aluminum: new THREE.MeshStandardMaterial({ color:0x999999, metalness:0.8, roughness:0.2 }),
  coil:     new THREE.MeshStandardMaterial({ color:0xcd7f32, metalness:0.7, roughness:0.3 }),
  solder:   new THREE.MeshStandardMaterial({ color:0xaaaaaa, metalness:0.9 }),
  ledG:     new THREE.MeshStandardMaterial({ color:0x00ff88, emissive:0x00ff88, emissiveIntensity:2 })
};

// --- HELPERS ---
const box = (w,h,d,m) => { const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m); mesh.castShadow=true; mesh.receiveShadow=true; return mesh; };
const cyl = (rt,rb,h,s,m) => { const mesh=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s),m); mesh.castShadow=true; mesh.receiveShadow=true; return mesh; };

// --- COMPONENTS ---

// 1. Cầu chì & Cuộn lọc EMI (Input Stage)
function buildEMI(x, z) {
  const g = new THREE.Group();
  // Fuse (Ống thủy tinh)
  const fuseBody = cyl(0.4, 0.4, 1.5, 12, new THREE.MeshStandardMaterial({ color:0xffffff, transparent:true, opacity:0.4 }));
  fuseBody.rotation.z = Math.PI/2;
  const fuseCap1 = cyl(0.42, 0.42, 0.3, 12, M.aluminum); fuseCap1.rotation.z = Math.PI/2; fuseCap1.position.x = -0.7;
  const fuseCap2 = cyl(0.42, 0.42, 0.3, 12, M.aluminum); fuseCap2.rotation.z = Math.PI/2; fuseCap2.position.x = 0.7;
  g.add(fuseBody, fuseCap1, fuseCap2);
  
  // EMI Filter (Cuộn cảm lọc nguồn)
  const core = box(2.5, 2.5, 1, M.plastic); core.position.set(3, 0.8, 0);
  const coil1 = cyl(0.8, 0.8, 1.2, 16, M.coil); coil1.position.set(2.5, 0.8, 0);
  const coil2 = cyl(0.8, 0.8, 1.2, 16, M.coil); coil2.position.set(3.5, 0.8, 0);
  g.add(core, coil1, coil2);
  
  g.position.set(x, 0.5, z);
  scene.add(g);
}

// 2. Tụ lọc nguồn chính (High Voltage Electrolytic)
function buildMainCap(x, z) {
  const g = new THREE.Group();
  const body = cyl(2, 2, 6, 24, new THREE.MeshStandardMaterial({ color:0x1a2a44 }));
  body.position.y = 3;
  const stripe = box(0.5, 5.8, 0.1, new THREE.MeshStandardMaterial({ color:0xcccccc }));
  stripe.position.set(0, 3, 1.95);
  g.add(body, stripe);
  g.position.set(x, 0, z);
  scene.add(g);
}

// 3. Biến áp xung (Transformer - Trái tim của mạch)
function buildTransformer(x, z) {
  const g = new THREE.Group();
  const core = box(6, 6, 5, M.plastic); core.position.y = 3;
  const tape = box(6.2, 3, 5.2, new THREE.MeshStandardMaterial({ color:0xeeee00 })); // Băng keo vàng cách điện
  tape.position.y = 3;
  
  const wire1 = box(0.5, 4, 0.5, M.copper); wire1.position.set(-2, -1, 0); // Chân biến áp
  const wire2 = box(0.5, 4, 0.5, M.copper); wire2.position.set(2, -1, 0);
  
  g.add(core, tape, wire1, wire2);
  g.position.set(x, 0, z);
  scene.add(g);
}

// 4. IC nguồn (PWM Controller) và Heatsink
function buildIC(x, z) {
  const g = new THREE.Group();
  const ic = box(2, 1, 3, M.plastic); ic.position.y = 0.5;
  // Tản nhiệt nhôm (Heatsink)
  const hs = box(0.5, 4, 3, M.aluminum); hs.position.set(1.2, 2, 0);
  for(let i=0; i<5; i++) {
    const fin = box(1.5, 4, 0.1, M.aluminum);
    fin.position.set(2, 2, -1 + i*0.5);
    g.add(fin);
  }
  g.add(ic, hs);
  g.position.set(x, 0, z);
  scene.add(g);
}

// 5. Tụ lọc đầu ra (Low Voltage Caps)
function buildOutputStage(x, z) {
  const g = new THREE.Group();
  for(let i=0; i<2; i++) {
    const cap = cyl(1.2, 1.2, 3.5, 16, new THREE.MeshStandardMaterial({ color:0x004422 }));
    cap.position.set(i*3, 1.75, 0);
    g.add(cap);
  }
  // LED báo nguồn
  const led = cyl(0.3, 0.3, 0.5, 8, M.ledG);
  led.position.set(1.5, 0.5, 3);
  g.add(led);
  
  g.position.set(x, 0, z);
  scene.add(g);
}

// --- PCB & LIGHTING ---
const board = box(60, 1, 40, M.pcb);
board.position.y = -0.5;
scene.add(board);

const amb = new THREE.AmbientLight(0xffffff, 0.4); scene.add(amb);
const sun = new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(20, 50, 20); sun.castShadow = true;
scene.add(sun);

// --- BỐ TRÍ MẠCH THEO KHỐI THỰC TẾ ---
// Khối AC Input (Bên trái)
buildEMI(-22, 0); 
// Khối chỉnh lưu & Lọc cao áp
buildMainCap(-12, 5);
// Khối điều khiển & Công suất
buildIC(-5, -5);
// Khối cách ly (Biến áp nằm giữa)
buildTransformer(5, 0);
// Khối DC Output (Bên phải)
buildOutputStage(20, 0);

// --- ANIMATION & CAMERA ---
let angle = 0;
function animate() {
  requestAnimationFrame(animate);
  angle += 0.003;
  
  camera.position.x = Math.cos(angle) * 70;
  camera.position.z = Math.sin(angle) * 70;
  camera.position.y = 40 + Math.sin(angle*0.5) * 10;
  camera.lookAt(0, 0, 0);
  
  // Cập nhật thông số giả lập
  if(Math.random() > 0.95) {
    document.getElementById('st').textContent = Math.floor(35 + Math.random() * 5);
    const el = Math.floor(performance.now()/1000);
    document.getElementById('su').textContent = new Date(el * 1000).toISOString().substr(11, 8);
  }
  
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
