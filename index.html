<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>3D Electronic City - First Person View</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui {
            position: absolute; bottom: 20px; left: 20px;
            color: #00ffcc; font-family: 'Courier New', monospace;
            text-shadow: 0 0 5px #00ffcc; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="ui">
        <h2>SYSTEM SCANNING...</h2>
        <p>> Camera: First-Person Mode</p>
        <p>> Target: Electronic City Center</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- KHỞI TẠO ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x051005, 5, 25); // Tạo sương mù cho chiều sâu

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- ÁNH SÁNG ---
        const ambient = new THREE.AmbientLight(0x404040, 1.5);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        // --- MẶT NỀN PCB ---
        const pcbGeo = new THREE.PlaneGeometry(100, 100);
        const pcbMat = new THREE.MeshStandardMaterial({ 
            color: 0x063d12, // Màu xanh PCB
            roughness: 0.3, 
            metalness: 0.2 
        });
        const pcb = new THREE.Mesh(pcbGeo, pcbMat);
        pcb.rotation.x = -Math.PI / 2;
        scene.add(pcb);

        // Lưới mạch (Grid)
        const grid = new THREE.GridHelper(100, 50, 0x00ff00, 0x002200);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- CÁC HÀM TẠO LINH KIỆN ---

        // 1. Chip IC
        function createChip(x, z) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2, 0.4, 2),
                new THREE.MeshStandardMaterial({ color: 0x222222 })
            );
            group.add(body);
            // Chân chip (Pin)
            const pinGeo = new THREE.BoxGeometry(0.1, 0.5, 0.1);
            const pinMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 1 });
            for(let i = -0.8; i <= 0.8; i += 0.4) {
                const p1 = new THREE.Mesh(pinGeo, pinMat); p1.position.set(1.05, -0.1, i);
                const p2 = new THREE.Mesh(pinGeo, pinMat); p2.position.set(-1.05, -0.1, i);
                group.add(p1, p2);
            }
            group.position.set(x, 0.2, z);
            return group;
        }

        // 2. Tụ điện (Capacitor)
        function createCapacitor(x, z) {
            const h = Math.random() * 1.5 + 1;
            const geo = new THREE.CylinderGeometry(0.5, 0.5, h, 32);
            const mat = new THREE.MeshStandardMaterial({ color: 0x00aaff });
            const cap = new THREE.Mesh(geo, mat);
            // Nắp bạc
            const top = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.1, 32), new THREE.MeshStandardMaterial({color: 0xcccccc}));
            top.position.y = h/2;
            cap.add(top);
            cap.position.set(x, h/2, z);
            return cap;
        }

        // 3. Điện trở (Resistor)
        function createResistor(x, z) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1, 16), new THREE.MeshStandardMaterial({color: 0xd2b48c}));
            body.rotation.z = Math.PI/2;
            group.add(body);
            // Chân đồng
            const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 2, 8), new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
            wire.rotation.z = Math.PI/2;
            group.add(wire);
            group.position.set(x, 0.1, z);
            return group;
        }

        // --- RẢI LINH KIỆN LÊN THÀNH PHỐ ---
        const components = [];
        for (let i = 0; i < 150; i++) {
            let item;
            const x = (Math.random() - 0.5) * 40;
            const z = (Math.random() - 0.5) * 40;
            const rand = Math.random();

            if(rand > 0.7) item = createChip(x, z);
            else if(rand > 0.3) item = createCapacitor(x, z);
            else item = createResistor(x, z);
            
            scene.add(item);
            components.push(item);
        }

        // --- HIỆU ỨNG BAY (FIRST PERSON VIEW) ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.005;

            // Camera bay theo đường hình sin (uốn lượn)
            camera.position.x = Math.sin(time * 0.5) * 15;
            camera.position.z = Math.cos(time * 0.3) * 15;
            camera.position.y = 1.5 + Math.sin(time) * 0.5; // Bay lên xuống nhẹ

            // Nhìn về phía trước
            const lookAtPos = new THREE.Vector3(
                Math.sin((time + 0.1) * 0.5) * 15,
                1.5,
                Math.cos((time + 0.1) * 0.3) * 15
            );
            camera.lookAt(lookAtPos);

            // Một vài linh kiện xoay nhẹ cho sinh động
            components.forEach((c, i) => {
                if(i % 5 === 0) c.rotation.y += 0.01;
            });

            renderer.render(scene, camera);
        }

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
