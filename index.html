<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronic Megacity 3D ⚡</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas { display:block; }
#overlay { position:fixed; inset:0; pointer-events:none; z-index:10; }
#title { position:absolute; top:30px; left:50%; transform:translateX(-50%); text-align:center; }
#title h1 { font-size:26px; font-weight:900; letter-spacing:12px; color:#00ffaa; text-shadow:0 0 20px #00ffaa; }
#title p { font-size:10px; color:#00ffaa66; letter-spacing:6px; margin-top:8px; }
#stats { position:absolute; bottom:30px; left:30px; font-size:11px; color:#00ffaa44; line-height:2.2; }
#legend { position:absolute; bottom:30px; right:30px; background:rgba(0,10,5,0.9); border:1px solid #00ffaa22; padding:15px; border-radius:4px; }
.li { display:flex; align-items:center; gap:10px; margin-bottom:6px; font-size:10px; color:#88bbaa; }
.ld { width:10px; height:10px; border-radius:2px; }
</style>
</head>
<body>

<div id="overlay">
  <div id="title">
    <h1>MEGACITY PCB v2.0</h1>
    <p>ADVANCED MULTI-BLOCK SYSTEM ARCHITECTURE</p>
  </div>
  <div id="legend">
    <div class="li"><div class="ld" style="background:#0044ff"></div>Micro-Controller (MCU)</div>
    <div class="li"><div class="ld" style="background:#00ff88"></div>Ceramic Caps (Trees)</div>
    <div class="li"><div class="ld" style="background:#ccaa00"></div>Power Inductors</div>
    <div class="li"><div class="ld" style="background:#444"></div>Mosfet / IC Units</div>
  </div>
  <div id="stats">
    CORE VOLTAGE: 1.2V DC<br>
    SYSTEM TEMP: 32.4°C<br>
    PROCESSING: 4.8 GHz<br>
    STATUS: <span style="color:#00ffaa">HYPER-ACTIVE</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// --- INITIAL SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010805);
scene.fog = new THREE.FogExp2(0x010805, 0.008);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 1500);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// --- MATERIALS ---
const M = {
  pcb: new THREE.MeshStandardMaterial({ color: 0x05220a, roughness: 0.8 }),
  copper: new THREE.MeshStandardMaterial({ color: 0xb8860b, metalness: 0.8, roughness: 0.2 }),
  mcu: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4 }),
  alum: new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.9, roughness: 0.2 }),
  ceramic: new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 0.5 }), // Tụ gốm màu xanh lá
  inductor: new THREE.MeshStandardMaterial({ color: 0x996600, metalness: 0.6 }),
  solder: new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9 })
};

// --- COMPONENT FACTORY ---
const box = (w,h,d,m,x,y,z) => {
  const g = new THREE.BoxGeometry(w,h,d);
  const mesh = new THREE.Mesh(g, m);
  mesh.position.set(x, y + h/2, z);
  mesh.castShadow = true; mesh.receiveShadow = true;
  return mesh;
};

// 1. Tụ gốm (Cây xanh điện tử)
function addCeramicCap(x, z) {
  const h = 1.5 + Math.random() * 2;
  const cap = box(0.8, h, 0.8, M.ceramic, x, 0, z);
  scene.add(cap);
}

// 2. Vi điều khiển (MCU)
function addMCU(x, z, size) {
  const g = new THREE.Group();
  const chip = box(size, 1.2, size, M.mcu, x, 0, z);
  g.add(chip);
  // Các chân đồng quanh MCU
  for(let i=0; i<8; i++) {
    const pin = box(0.5, 0.2, 1, M.copper, x - size/2 - 0.5, 0, z - size/2 + (i*size/7));
    g.add(pin);
  }
  scene.add(g);
}

// 3. Khối Tản nhiệt & Mosfet (Control Block)
function addMosfetBlock(x, z) {
  const base = box(6, 0.5, 4, M.alum, x, 0, z);
  for(let i=0; i<5; i++) {
    const fin = box(0.1, 3, 4, M.alum, x - 2.5 + i*1.2, 0, z);
    scene.add(fin);
  }
  scene.add(base);
}

// 4. Cuộn cảm công suất (Power Inductor)
function addInductor(x, z) {
  const body = box(4, 3.5, 4, M.inductor, x, 0, z);
  const top = box(3.5, 0.2, 3.5, M.mcu, x, 3.5, z);
  scene.add(body, top);
}

// --- XÂY DỰNG PCB HÌNH VUÔNG RỘNG ---
const boardSize = 120;
const mainBoard = box(boardSize, 1.5, boardSize, M.pcb, 0, -1.5, 0);
scene.add(mainBoard);

// THIẾT KẾ CÁC KHỐI CHỨC NĂNG
// 1. Khối Nguồn (Power Block) - Góc trái
for(let i=0; i<3; i++) addInductor(-40 + (i*10), -40);
for(let i=0; i<15; i++) addCeramicCap(-50 + Math.random()*20, -30 + Math.random()*20);

// 2. Khối Vi điều khiển trung tâm (Core Block)
addMCU(0, 0, 12); // MCU Chính
for(let i=0; i<40; i++) {
    const ang = (i/40) * Math.PI * 2;
    const r = 18 + Math.random()*5;
    addCeramicCap(Math.cos(ang)*r, Math.sin(ang)*r); // Rừng tụ quanh MCU
}

// 3. Khối Điều khiển (Control Block) - Góc phải
addMosfetBlock(40, 40);
addMosfetBlock(40, 25);
for(let i=0; i<20; i++) addCeramicCap(30 + Math.random()*20, 20 + Math.random()*30);

// 4. Khối Giao tiếp (I/O Block)
for(let i=0; i<5; i++) addMCU(-40, 30 - (i*15), 4);

// ĐƯỜNG MẠCH ĐỒNG (TRACES)
for(let i=0; i<15; i++) {
  const w = 0.5 + Math.random();
  const trace = box(boardSize, 0.1, w, M.copper, 0, -0.1, -boardSize/2 + Math.random()*boardSize);
  scene.add(trace);
}

// --- ÁNH SÁNG ---
const amb = new THREE.AmbientLight(0xffffff, 0.2); scene.add(amb);
const sun = new THREE.PointLight(0x00ffaa, 1.5, 200); sun.position.set(0, 50, 0); scene.add(sun);
const moon = new THREE.DirectionalLight(0x0044ff, 0.5); moon.position.set(-50, 50, -50); scene.add(moon);

// --- CAMERA CHUYỂN ĐỘNG QUAY TRÊN ĐẦU (FLY-OVER) ---
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.0015;

  // Camera bay lướt như flycam qua các khối linh kiện
  camera.position.x = Math.sin(time) * 80;
  camera.position.z = Math.cos(time * 0.8) * 80;
  camera.position.y = 45 + Math.sin(time * 0.5) * 15;
  
  camera.lookAt(Math.sin(time*2)*10, 0, Math.cos(time*2)*10);
  
  // Hiệu ứng nhấp nháy cho tụ gốm
  M.ceramic.emissiveIntensity = 0.5 + Math.sin(time * 10) * 0.3;

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>
