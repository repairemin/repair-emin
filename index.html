<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiến Thắng Center - STM32 Banner</title>
    <style>
        /* Reset mặc định của trình duyệt */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: #000; /* Nền đen để tránh lộ khoảng trắng khi load ảnh */
            overflow-x: hidden;
        }

        /* Layer 1: Background Photorealistic */
        .banner-container {
            position: relative;
            width: 100%;
            height: 100vh; /* Chiều cao tràn màn hình */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pcb-background {
            position: absolute;
            top: -5%; /* Tràn ra ngoài một chút để phục vụ Parallax sau này */
            left: -5%;
            width: 110%;
            height: 110%;
            
            /* Chèn ảnh của bạn ở đây */
            background-image: url('stm32-bg.png'); 
            
            background-size: cover;
            background-position: center;
            filter: brightness(0.8); /* Giảm độ sáng một chút để nổi bật nội dung phía trên */
            z-index: 1;
            transition: transform 0.1s ease-out; /* Giúp hiệu ứng di chuyển mượt hơn */
        }

        /* Lớp phủ nội dung (Test trước khi thêm 3D) */
        .content-overlay {
            position: relative;
            z-index: 10;
            color: white;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 0px 0px 20px rgba(0, 255, 255, 0.8);
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <div class="pcb-background" id="bgLayer"></div>

        <div class="content-overlay">
            <h1>STM32 CORE</h1>
            <p>High-End Electronics Repair & Development</p>
        </div>
    </div>

    <script>
        // Hiệu ứng Parallax cơ bản cho Layer 1
        const bg = document.getElementById('bgLayer');
        
        window.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            
            bg.style.transform = `translateX(${x}px) translateY(${y}px) scale(1.05)`;
        });
    </script>

</body>
</html>
