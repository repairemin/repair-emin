<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tiến Thắng Center | 3D PCB Procedural Generation</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #overlay { position: absolute; top: 20px; left: 20px; color: #00f2ff; z-index: 10; pointer-events: none; }
        .log { font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="margin:0; letter-spacing: 3px;">TIẾN THẮNG CENTER</h2>
        <p class="log" id="status">> Initializing PCB Engine...</p>
        <p class="log" id="comp-count">> Components: 0</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, pcbGroup;
        const components = [];

        // --- Cấu trúc linh kiện ---
        class ElectronicComponent {
            constructor(type, x, z) {
                this.group = new THREE.Group();
                this.type = type;
                this.create(type);
                this.group.position.set(x, 100, z); // Rơi từ trên xuống
                this.targetY = 0.8;
                this.speed = Math.random() * 0.05 + 0.02;
            }

            create(type) {
                if (type === 'IC') {
                    // Thân Chip
                    const body = new THREE.Mesh(
                        new THREE.BoxGeometry(8, 1.5, 8),
                        new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.8 })
                    );
                    this.group.add(body);
                    // Chân Chip (4 cạnh)
                    const pinGeo = new THREE.BoxGeometry(0.2, 0.1, 1.2);
                    const pinMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
                    for(let i=-3; i<=3; i++) {
                        const p1 = new THREE.Mesh(pinGeo, pinMat); p1.position.set(-4.2, -0.6, i); this.group.add(p1);
                        const p2 = new THREE.Mesh(pinGeo, pinMat); p2.position.set(4.2, -0.6, i); this.group.add(p2);
                    }
                } else if (type === 'CAP') {
                    // Tụ hóa hình trụ
                    const body = new THREE.Mesh(
                        new THREE.CylinderGeometry(1.5, 1.5, 4, 16),
                        new THREE.MeshStandardMaterial({ color: 0x003366, metalness: 0.5 })
                    );
                    this.group.add(body);
                    // Vạch trắng âm
                    const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.4, 4.1, 1), new THREE.MeshBasicMaterial({color: 0xaaaaaa}));
                    stripe.position.x = 1.3; this.group.add(stripe);
                } else if (type === 'RES') {
                    // Điện trở dán SMD
                    const body = new THREE.Mesh(
                        new THREE.BoxGeometry(2, 0.8, 1),
                        new THREE.MeshStandardMaterial({ color: 0x333333 })
                    );
                    this.group.add(body);
                    const cap = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.9, 1.1), new THREE.MeshStandardMaterial({color: 0xbbbbbb}));
                    const c1 = cap.clone(); c1.position.x = 0.8; this.group.add(c1);
                    const c2 = cap.clone(); c2.position.x = -0.8; this.group.add(c2);
                }
            }

            update() {
                if (this.group.position.y > this.targetY) {
                    this.group.position.y -= (this.group.position.y - this.targetY) * this.speed;
                }
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(40, 40, 40);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x020508);
            document.body.appendChild(renderer.domElement);

            pcbGroup = new THREE.Group();
            scene.add(pcbGroup);

            // 1. Phôi PCB
            const pcb = new THREE.Mesh(
                new THREE.BoxGeometry(50, 1, 50),
                new THREE.MeshStandardMaterial({ color: 0x0a3d0a, roughness: 0.2 })
            );
            pcbGroup.add(pcb);

            // 2. Đường mạch đồng (Traces)
            const traceMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.4 });
            for(let i=0; i<30; i++) {
                const w = Math.random() > 0.5 ? 20 : 0.4;
                const h = Math.random() > 0.5 ? 0.4 : 20;
                const trace = new THREE.Mesh(new THREE.PlaneGeometry(w, h), traceMat);
                trace.rotation.x = -Math.PI/2;
                trace.position.set((Math.random()-0.5)*40, 0.51, (Math.random()-0.5)*40);
                pcbGroup.add(trace);
            }

            // 3. Render linh kiện theo lô
            addRandomComp('IC', 0, 0);
            for(let i=0; i<5; i++) addRandomComp('CAP', (Math.random()-0.5)*40, (Math.random()-0.5)*40);
            for(let i=0; i<15; i++) addRandomComp('RES', (Math.random()-0.5)*40, (Math.random()-0.5)*40);

            // Ánh sáng
            const pLight = new THREE.PointLight(0x00f2ff, 1.5, 200);
            pLight.position.set(20, 30, 20);
            scene.add(pLight);
            scene.add(new THREE.AmbientLight(0x404040));
        }

        function addRandomComp(type, x, z) {
            const c = new ElectronicComponent(type, x, z);
            pcbGroup.add(c.group);
            components.push(c);
            document.getElementById('comp-count').innerText = `> Components: ${components.length}`;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.0005;

            components.forEach(c => c.update());
            
            pcbGroup.rotation.y += 0.002;
            camera.lookAt(0,0,0);
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
