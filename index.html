<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tiến Thắng Center | 3D High-Tech Repair</title>
    <style>
        body { margin: 0; background: #00050a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Giao diện HUD lơ lửng */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; pointer-events: none;
            background: radial-gradient(circle, transparent 20%, rgba(0, 0, 0, 0.4) 100%);
        }

        .brand-box {
            border: 2px solid #00f2ff;
            padding: 40px 60px;
            background: rgba(0, 242, 255, 0.05);
            backdrop-filter: blur(5px);
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2), inset 0 0 20px rgba(0, 242, 255, 0.1);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); /* Cắt góc kiểu hitech */
        }

        h1 {
            color: #fff; font-size: 4rem; margin: 0; letter-spacing: 10px;
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
            font-weight: 900; text-transform: uppercase;
        }

        .subtitle {
            color: #00f2ff; font-size: 1.2rem; margin-top: 15px;
            letter-spacing: 4px; font-weight: 300; text-transform: uppercase;
        }

        .status-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #00f2ff; font-size: 0.7rem; letter-spacing: 2px;
            display: flex; gap: 20px; opacity: 0.6;
        }

        .scanning-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.5);
            box-shadow: 0 0 15px #00f2ff;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="scanning-line"></div>

    <div id="overlay">
        <div class="brand-box">
            <h1>TIẾN THẮNG</h1>
            <div class="subtitle">Measurement Equipment Expert</div>
        </div>
        <div class="status-bar">
            <span>CORE: ONLINE</span>
            <span>DIAGNOSTIC: ACTIVE</span>
            <span>LOCATION: BAC NINH</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        let scene, camera, renderer, particles, grid;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 100;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 1. Tạo lưới mạch điện 3D (Grid)
            const gridHelper = new THREE.GridHelper(400, 40, 0x00f2ff, 0x002233);
            gridHelper.rotation.x = Math.PI / 2.5;
            gridHelper.position.y = -20;
            scene.add(gridHelper);
            grid = gridHelper;

            // 2. Tạo hệ thống hạt điện tử (Digital Particles)
            const pGeometry = new THREE.BufferGeometry();
            const pCount = 2000;
            const pPositions = new Float32Array(pCount * 3);
            
            for(let i = 0; i < pCount * 3; i++) {
                pPositions[i] = (Math.random() - 0.5) * 600;
            }
            
            pGeometry.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
            const pMaterial = new THREE.PointsMaterial({
                size: 0.7,
                color: 0x00f2ff,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            
            particles = new THREE.Points(pGeometry, pMaterial);
            scene.add(particles);

            // 3. Ánh sáng
            const light = new THREE.PointLight(0x00f2ff, 1, 500);
            light.position.set(0, 0, 50);
            scene.add(light);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Chuyển động lướt mạch điện
            grid.position.z += 0.5;
            if (grid.position.z > 20) grid.position.z = 0;

            // Hạt điện tử xoay nhẹ theo chuột
            particles.rotation.y += 0.001;
            particles.rotation.x += 0.0005;

            renderer.render(scene, camera);
        }

        // Tương tác chuột
        document.addEventListener('mousemove', (e) => {
            const mouseX = (e.clientX - window.innerWidth / 2) / 100;
            const mouseY = (e.clientY - window.innerHeight / 2) / 100;
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
