<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tiến Thắng Center | 3D PCB Assembly</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { position: fixed; width: 100%; height: 100%; }
        #hud {
            position: absolute; top: 30px; left: 30px; color: #00f2ff;
            z-index: 10; pointer-events: none; text-shadow: 0 0 10px #00f2ff;
        }
        .label { font-size: 2.5rem; font-weight: bold; margin: 0; letter-spacing: 5px; }
        .data { font-size: 0.9rem; opacity: 0.7; border-left: 3px solid #00f2ff; padding-left: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="hud">
        <p class="label">TIẾN THẮNG CENTER</p>
        <div class="data">
            PCB ID: 77-88-TT<br>
            STATUS: ASSEMBLING COMPONENTS...<br>
            VOLTAGE: 220.45V | TEMP: 32°C
        </div>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, pcb, components = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(50, 40, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 1. Tạo bản mạch PCB (Green Glass)
            const pcbGeom = new THREE.BoxGeometry(40, 1, 60);
            const pcbMat = new THREE.MeshPhongMaterial({ 
                color: 0x004411, 
                transparent: true, 
                opacity: 0.8,
                shininess: 100
            });
            pcb = new THREE.Mesh(pcbGeom, pcbMat);
            scene.add(pcb);

            // Vẽ các đường mạch (Trace) chạy trên PCB
            const grid = new THREE.GridHelper(60, 20, 0x00f2ff, 0x002200);
            grid.position.y = 0.6;
            pcb.add(grid);

            // 2. Tạo linh kiện (Components) chạy nhảy
            const compGeom = new THREE.BoxGeometry(2, 2, 2);
            for (let i = 0; i < 40; i++) {
                const compMat = new THREE.MeshPhongMaterial({ 
                    color: i % 2 === 0 ? 0x00f2ff : 0xff00ff,
                    emissive: i % 2 === 0 ? 0x004444 : 0x440044
                });
                const mesh = new THREE.Mesh(compGeom, compMat);
                
                // Vị trí đích (Target) trên mặt PCB
                mesh.targetPos = new THREE.Vector3(
                    (Math.random() - 0.5) * 35,
                    1.5,
                    (Math.random() - 0.5) * 55
                );
                
                // Vị trí bay lơ lửng ban đầu
                mesh.position.set(
                    (Math.random() - 0.5) * 100,
                    50 + Math.random() * 50,
                    (Math.random() - 0.5) * 100
                );
                
                scene.add(mesh);
                components.push(mesh);
            }

            // Ánh sáng
            const light1 = new THREE.PointLight(0x00f2ff, 1, 500);
            light1.position.set(50, 50, 50);
            scene.add(light1);
            scene.add(new THREE.AmbientLight(0x404040));
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;

            // Xoay PCB chầm chậm
            pcb.rotation.y += 0.005;

            // Cho linh kiện bay về vị trí mạch
            components.forEach((c, index) => {
                // Hiệu ứng bay lượn (Lerp)
                c.position.x += (pcb.position.x + c.targetPos.x - c.position.x) * 0.02;
                c.position.z += (pcb.position.z + c.targetPos.z - c.position.z) * 0.02;
                
                // Độ cao bay dập dềnh trước khi "hạ cánh"
                const hoverHeight = c.targetPos.y + Math.sin(time + index) * 5;
                c.position.y += (hoverHeight - c.position.y) * 0.02;
                
                c.rotation.x += 0.02;
                c.rotation.y += 0.02;
            });

            // Camera xoay quanh tâm
            camera.lookAt(pcb.position);
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
