<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tiến Thắng Center | Hyper-Realistic 3D PCB</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 30px; left: 30px; color: #00f2ff; z-index: 100; pointer-events: none; }
        .glitch-title { font-size: 2.5rem; font-weight: 900; text-shadow: 0 0 15px #00f2ff; letter-spacing: 5px; margin: 0; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 class="glitch-title">TIẾN THẮNG CENTER</h1>
        <div style="font-family: monospace; opacity: 0.8; margin-top: 10px;">
            > RENDERING MODE: PBR_ULTRA<br>
            > TEXTURE: SILKSCREEN_GOLD<br>
            > STATUS: CALIBRATION_COMPLETE
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, pcbGroup;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(35, 30, 35);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.body.appendChild(renderer.domElement);

            pcbGroup = new THREE.Group();
            scene.add(pcbGroup);

            // 1. PCB VỚI MÀU XANH SM (Solder Mask) SÂU & BÓNG
            const pcbGeo = new THREE.BoxGeometry(45, 1.2, 45);
            const pcbMat = new THREE.MeshStandardMaterial({ 
                color: 0x021a10, 
                roughness: 0.1, 
                metalness: 0.3 
            });
            const pcb = new THREE.Mesh(pcbGeo, pcbMat);
            pcbGroup.add(pcb);

            // 2. VẼ CHỮ "TIẾN THẮNG CENTER" TRỰC TIẾP TRÊN MẶT MẠCH (Silkscreen)
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024; canvas.height = 1024;
            ctx.fillStyle = "#00f2ff";
            ctx.font = "Bold 80px Arial";
            ctx.fillText("TIẾN THẮNG CENTER", 150, 200);
            const textTex = new THREE.CanvasTexture(canvas);
            const textMat = new THREE.MeshBasicMaterial({ map: textTex, transparent: true, opacity: 0.6 });
            const textPlate = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), textMat);
            textPlate.rotation.x = -Math.PI/2;
            textPlate.position.y = 0.61;
            pcbGroup.add(textPlate);

            // 3. CHIP MCU CÓ CHÂN VÀ KÝ HIỆU LASER
            const chipGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(12, 1.5, 12), new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.4}));
            chipGroup.add(body);
            
            // Vẽ chân chip (mạ bạc)
            const pinGeo = new THREE.BoxGeometry(0.4, 0.1, 2);
            const pinMat = new THREE.MeshStandardMaterial({color: 0xffffff, metalness: 1, roughness: 0.1});
            for(let i=-5; i<=5; i+=1.2) {
                const p1 = new THREE.Mesh(pinGeo, pinMat); p1.position.set(-6.5, -0.6, i); chipGroup.add(p1);
                const p2 = new THREE.Mesh(pinGeo, pinMat); p2.position.set(6.5, -0.6, i); chipGroup.add(p2);
            }
            chipGroup.position.y = 1.3;
            pcbGroup.add(chipGroup);

            // 4. LINH KIỆN TỤ ĐIỆN VÀ TRỞ CHI TIẾT
            for(let i=0; i<15; i++) {
                const rGroup = new THREE.Group();
                const rBody = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 3, 16), new THREE.MeshStandardMaterial({color: 0x225588}));
                rBody.rotation.z = Math.PI/2;
                rGroup.add(rBody);
                // Vạch màu trên điện trở
                const ring = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, 0.2, 16), new THREE.MeshBasicMaterial({color: 0xffd700}));
                ring.rotation.z = Math.PI/2; ring.position.x = 0.5; rGroup.add(ring);
                
                rGroup.position.set((Math.random()-0.5)*35, 1.2, (Math.random()-0.5)*35);
                pcbGroup.add(rGroup);
            }

            // 5. ĐƯỜNG MẠCH MẠ VÀNG (GOLD TRACES)
            const traceMat = new THREE.MeshStandardMaterial({color: 0xffd700, metalness: 1, roughness: 0.2});
            for(let j=0; j<40; j++) {
                const w = Math.random()*20;
                const trace = new THREE.Mesh(new THREE.BoxGeometry(w, 0.05, 0.4), traceMat);
                trace.position.set((Math.random()-0.5)*40, 0.61, (Math.random()-0.5)*40);
                if(Math.random()>0.5) trace.rotation.y = Math.PI/2;
                pcbGroup.add(trace);
            }

            // ÁNH SÁNG STUDIO ĐỂ TẠO ĐỘ BÓNG
            const light1 = new THREE.PointLight(0xffffff, 1.5, 100);
            light1.position.set(20, 30, 20);
            scene.add(light1);
            const light2 = new THREE.PointLight(0x00f2ff, 1, 100);
            light2.position.set(-20, 20, -20);
            scene.add(light2);
            scene.add(new THREE.AmbientLight(0x222222));
        }

        function animate() {
            requestAnimationFrame(animate);
            pcbGroup.rotation.y += 0.003;
            pcbGroup.rotation.x = Math.sin(Date.now()*0.001)*0.1;
            camera.lookAt(0,0,0);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
