<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronic City 3D Banner</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffcc;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 10px #00ffcc;
        }
        h1 { font-size: 3rem; letter-spacing: 5px; margin: 0; }
        p { color: #555; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>TIẾN THẮNG CENTER</h1>
        <p>Electronic Component City - 3D Simulation</p>
    </div>

    <div id="canvas-container"></div>

    <!-- Tải thư viện Three.js -->
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- CẤU HÌNH CƠ BẢN ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.FogExp2(0x020202, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- ÁNH SÁNG ---
        const ambientLight = new THREE.AmbientLight(0x404040, 2); 
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x00ffcc, 2, 50);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // --- TẠO THÀNH PHỐ LINH KIỆN ---
        const cityGroup = new THREE.Group();

        // Hàm tạo "Tòa nhà" linh kiện
        function createComponent(x, z, h, color) {
            const geometry = new THREE.BoxGeometry(1, h, 1);
            const material = new THREE.MeshStandardMaterial({ 
                color: color,
                emissive: color,
                emissiveIntensity: 0.2,
                metalness: 0.9,
                roughness: 0.1
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, h/2, z);
            
            // Thêm "chân rết" IC cho đẹp
            const wireframe = new THREE.LineSegments(
                new THREE.EdgesGeometry(geometry),
                new THREE.LineBasicMaterial({ color: 0x00ffcc })
            );
            mesh.add(wireframe);
            return mesh;
        }

        // Tạo CPU Trung tâm
        const cpuCentral = createComponent(0, 0, 1, 0x333333);
        cpuCentral.scale.set(3, 0.5, 3);
        scene.add(cpuCentral);

        // Tạo các tòa nhà xung quanh (linh kiện nhỏ)
        for(let i=0; i<40; i++) {
            const x = (Math.random() - 0.5) * 20;
            const z = (Math.random() - 0.5) * 20;
            if (Math.abs(x) < 3 && Math.abs(z) < 3) continue; // Tránh đè lên CPU trung tâm
            
            const h = Math.random() * 4 + 0.5;
            const color = i % 2 === 0 ? 0x00ffcc : 0x0066ff;
            const building = createComponent(x, z, h, color);
            cityGroup.add(building);
        }
        scene.add(cityGroup);

        // --- HIỆU ỨNG DỮ LIỆU (PARTICLES) ---
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i=0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 30;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.05,
            color: 0x00ffcc,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Xoay nhẹ cả thành phố
            cityGroup.rotation.y += 0.002;
            particlesMesh.rotation.y -= 0.001;

            // Hiệu ứng đèn nhấp nháy cho CPU
            const time = Date.now() * 0.005;
            cpuCentral.material.emissiveIntensity = Math.sin(time) * 0.5 + 0.5;

            controls.update();
            renderer.render(scene, camera);
        }

        // Xử lý khi resize màn hình
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
